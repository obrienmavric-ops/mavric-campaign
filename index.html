<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Mavric Campaign</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0a0a0a;
  color:white;
}

.hero{
  padding:60px 20px;
  text-align:center;
  background: radial-gradient(circle at top, #3b0764, #000);
}

.hero h1{ color:#c084fc; margin:0; }
.slogan{ color:gold; font-weight:bold; margin-top:10px; }

.section{
  padding:25px 15px;
  max-width:900px;
  margin:auto;
}

h2{ color:#c084fc; text-align:center; }

.card{
  background:#111;
  border:1px solid #222;
  padding:12px;
  border-radius:10px;
}

input, button{
  width:100%;
  max-width:400px;
  padding:12px;
  margin:6px auto;
  display:block;
  border-radius:10px;
  border:none;
}

button{
  background:#a855f7;
  color:white;
  font-weight:bold;
}

/* IDEAS */
.idea{
  background:#111;
  border:1px solid #222;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
}

.voteBtn{
  margin-top:8px;
  background:#222;
  border:1px solid #333;
}

/* PHOTOS */
.feed{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}

.photo img{
  width:100%;
  aspect-ratio:1/1;
  object-fit:cover;
  border-radius:10px;
}

.caption{
  padding:8px;
}

/* TIMER */
#timer{
  color:#c084fc;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="hero">
  <h1>Mavric for Student Leadership</h1>
  <div class="slogan">“Your Voice, My Actions.”</div>
  <div id="timer"></div>
</div>

<div class="section">
  <h2>💡 Ideas</h2>

  <input id="ideaInput" placeholder="Submit idea">
  <button onclick="submitIdea()">Submit</button>

  <div id="ideas"></div>
</div>

<div class="section">
  <h2>📸 Supporter Feed</h2>

  <input type="file" id="fileInput">
  <input id="captionInput" placeholder="Caption">
  <input id="uploadPassword" placeholder="Upload password">
  <button onclick="uploadPhoto()">Upload</button>

  <div class="feed" id="feed"></div>
</div>

<script>

const SUPABASE_URL = "https://didfhlfvdvurkfwbipli.supabase.co";
const SUPABASE_KEY = "sb_publishable_H6LVD2AlVaJ6SvHToXorgw_4ozq4FT0";
const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const end = new Date("2026-04-24T00:00:00");

/* TIMER */
function updateTimer(){
  const diff = end - new Date();

  if(diff <= 0){
    document.getElementById("timer").innerHTML =
      "🗳️ VOTING DAY IS FRIDAY, APRIL 24TH, 2026";
    return;
  }

  const d = Math.floor(diff/86400000);
  const h = Math.floor(diff/3600000)%24;
  const m = Math.floor(diff/60000)%60;

  document.getElementById("timer").innerHTML =
    `⏳ ${d}d ${h}h ${m}m left`;
}

/* =========================
   VOTING SYSTEM (FIXED)
   1 VOTE PER PERSON PER IDEA
========================= */

function voteKey(ideaId){
  return "voted_idea_" + ideaId;
}

function hasVoted(ideaId){
  return localStorage.getItem(voteKey(ideaId)) === "true";
}

function markVoted(ideaId){
  localStorage.setItem(voteKey(ideaId), "true");
}

/* LOAD IDEAS */
async function loadIdeas(){
  const { data } = await client.from("ideas").select("*");
  if(!data) return;

  document.getElementById("ideas").innerHTML = data.map(i => `
    <div class="idea">
      💡 ${i.text}<br><br>
      🗳️ ${i.votes || 0} votes

      <button class="voteBtn" onclick="voteIdea('${i.id}')">
        ${hasVoted(i.id) ? "Already Voted" : "Vote"}
      </button>
    </div>
  `).join("");
}

/* VOTE */
async function voteIdea(id){

  if(hasVoted(id)){
    alert("You already voted for this idea.");
    return;
  }

  const { data } = await client
    .from("ideas")
    .select("votes")
    .eq("id", id)
    .single();

  const newVotes = (data?.votes || 0) + 1;

  await client
    .from("ideas")
    .update({ votes: newVotes })
    .eq("id", id);

  markVoted(id);

  loadIdeas();

  confetti({particleCount:80, spread:60});
}

/* SUBMIT IDEA */
async function submitIdea(){
  const text = document.getElementById("ideaInput").value;
  if(!text) return;

  await client.from("ideas").insert({ text, votes:0 });

  document.getElementById("ideaInput").value = "";

  loadIdeas();
}

/* PHOTOS */
const UPLOAD_PASSWORD = "1234";

async function uploadPhoto(){

  if(document.getElementById("uploadPassword").value !== UPLOAD_PASSWORD){
    alert("Wrong password");
    return;
  }

  const file = document.getElementById("fileInput").files[0];
  const caption = document.getElementById("captionInput").value;

  if(!file) return;

  const name = Date.now() + "-" + file.name;

  await client.storage.from("campaign").upload(name, file);

  const url = client.storage.from("campaign")
    .getPublicUrl(name).data.publicUrl;

  await client.from("photos").insert({ url, caption });

  loadPhotos();
}

/* LOAD PHOTOS */
async function loadPhotos(){
  const { data } = await client.from("photos").select("*");
  if(!data) return;

  document.getElementById("feed").innerHTML = data.map(p => `
    <div class="photo">
      <img src="${p.url}">
      <div class="caption">${p.caption || ""}</div>
    </div>
  `).join("");
}

/* INIT */
loadIdeas();
loadPhotos();
updateTimer();

setInterval(updateTimer, 1000);

</script>

</body>
</html>
