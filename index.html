<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Mavric Campaign</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
/* =========================
   GLOBAL
========================= */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family: Arial, sans-serif;
  color:white;
  background:#0b0b0f;
}

/* =========================
   HEADER
========================= */
header{
  position:sticky;
  top:0;
  z-index:10;

  background:#111;
  padding:14px;
  text-align:center;

  color:#a855f7;
  font-weight:800;

  border-bottom:1px solid #333;
}

/* =========================
   SECTIONS
========================= */
.section{
  padding:22px 16px;
  text-align:center;
  max-width:900px;
  margin:auto;
}

/* =========================
   INPUTS + BUTTONS
========================= */
input, button{
  width:92%;
  max-width:360px;
  padding:12px;
  margin:8px auto;

  display:block;
  border-radius:10px;
  border:none;
}

input{
  background:#1a1a1a;
  color:white;
  border:1px solid #333;
}

button{
  background:#a855f7;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  opacity:0.9;
}

/* =========================
   TIMER
========================= */
#timer{
  font-size:18px;
  margin-top:10px;
  color:#a855f7;
}

.voting-day{
  font-size:24px;
  font-weight:800;
  color:gold;
}

/* =========================
   IDEAS
========================= */
.idea{
  background:#111;
  border:1px solid #333;
  padding:12px;
  margin:10px auto;
  max-width:520px;
  border-radius:10px;
  text-align:left;
}

/* =========================
   FEED
========================= */
.feed{
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(140px, 1fr));
  gap:10px;
}

.photo{
  background:#111;
  border:1px solid #333;
  border-radius:10px;
  overflow:hidden;
}

/* FIX IMAGE STRETCH */
.photo img{
  width:100%;
  height:160px;
  object-fit:cover;
  display:block;
}

.photo div{
  padding:8px;
  font-size:13px;
}
</style>
</head>

<body>

<header>🗳️ Mavric Campaign Page</header>

<!-- HERO -->
<div class="section">
  <h2>Your Voice. Your Vote.</h2>
  <div id="timer"></div>
</div>

<!-- IDEAS -->
<div class="section">
  <h2>💡 Ideas</h2>
  <input id="ideaInput" placeholder="Submit idea"/>
  <button onclick="submitIdea()">Submit</button>
  <div id="ideas">Loading...</div>
</div>

<!-- PHOTO UPLOAD -->
<div class="section">
  <h2>📸 Supporter Feed</h2>
  <input type="file" id="fileInput" multiple />
  <input id="captionInput" placeholder="Caption"/>
  <button onclick="uploadPhoto()">Upload</button>
  <div class="feed" id="feed"></div>
</div>

<script>

/* =========================
   SUPABASE
========================= */
const SUPABASE_URL = "https://didfhlfvdvurkfwbipli.supabase.co";
const SUPABASE_KEY = "sb_publishable_H6LVD2AlVaJ6SvHToXorgw_4ozq4FT0";

const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

/* =========================
   TIMER
========================= */
const end = new Date("2026-04-24T00:00:00");

function updateTimer(){
  const now = new Date();
  const diff = end - now;

  const el = document.getElementById("timer");

  if(diff <= 0){
    el.innerHTML = `<div class="voting-day">🗳️ VOTING DAY IS HERE</div>`;
    return;
  }

  const d = Math.floor(diff/86400000);
  const h = Math.floor(diff/3600000)%24;
  const m = Math.floor(diff/60000)%60;

  el.innerHTML = `⏳ ${d}d ${h}h ${m}m left`;
}

/* =========================
   IDEAS
========================= */
async function loadIdeas(){
  const { data, error } = await client.from("ideas").select("*");

  const el = document.getElementById("ideas");

  if(error){
    el.innerHTML = error.message;
    return;
  }

  if(!data){
    el.innerHTML = "No ideas yet";
    return;
  }

  el.innerHTML = data.map(i => `
    <div class="idea">
      💡 ${i.text}<br>
      🗳️ ${i.votes || 0} votes | ❤️ ${i.likes || 0}
    </div>
  `).join("");
}

async function submitIdea(){
  const text = document.getElementById("ideaInput").value;
  if(!text) return;

  await client.from("ideas").insert({
    text,
    votes:0,
    likes:0
  });

  document.getElementById("ideaInput").value = "";
  loadIdeas();

  confetti({particleCount:80, spread:60});
}

/* =========================
   PHOTOS
========================= */
async function uploadPhoto(){
  const file = document.getElementById("fileInput").files[0];
  const caption = document.getElementById("captionInput").value;

  if(!file) return;

  const name = Date.now() + "-" + file.name;

  const { error } = await client.storage
    .from("campaign")
    .upload(name, file);

  if(error){
    alert(error.message);
    return;
  }

  const url = client.storage
    .from("campaign")
    .getPublicUrl(name).data.publicUrl;

  await client.from("photos").insert({
    url,
    caption,
    likes:0
  });

  loadPhotos();
}

async function loadPhotos(){
  const { data } = await client.from("photos").select("*");

  if(!data) return;

  document.getElementById("feed").innerHTML = data.map(p => `
    <div class="photo">
      <img src="${p.url}">
      <div>${p.caption || ""}</div>
    </div>
  `).join("");
}

/* =========================
   INIT
========================= */
loadIdeas();
loadPhotos();
updateTimer();

setInterval(updateTimer,1000);
setInterval(loadIdeas,3000);
setInterval(loadPhotos,3000);

</script>

</body>
</html>
