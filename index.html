<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<title>DEBUG TEST</title>
</head>

<body style="background:black;color:white;text-align:center;padding:40px;">

<h1>DEBUG MODE</h1>

<div id="step1">Step 1: Page Loaded ❌</div>
<div id="step2">Step 2: JS Running ❌</div>
<div id="step3">Step 3: Buttons Active ❌</div>

<button id="testBtn">CLICK TEST</button>

<script>

document.getElementById("step1").innerText = "Step 1: Page Loaded ✅";
console.log("STEP 1 OK");

try {
  document.getElementById("step2").innerText = "Step 2: JS Running ✅";
  console.log("STEP 2 OK");
} catch(e){
  console.log("STEP 2 FAIL", e);
}

document.getElementById("testBtn").onclick = () => {
  alert("BUTTON WORKS");
  document.getElementById("step3").innerText = "Step 3: Buttons Active ✅";
};

console.log("SCRIPT FINISHED");

</script>

</body>
</html>
