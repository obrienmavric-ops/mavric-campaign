<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Election Night Platform</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
  margin:0;
  font-family:Arial;
  background:#0a0a10;
  color:white;
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  padding:12px;
  background:#111;
  border-bottom:1px solid #333;
}

.live{
  color:red;
  font-weight:bold;
  animation:blink 1s infinite;
}

@keyframes blink{50%{opacity:0.3}}

/* CENTER INPUT AREA */
.center{
  text-align:center;
  padding:10px;
}

input{
  width:90%;
  max-width:400px;
  padding:10px;
  margin:6px;
  border-radius:8px;
  border:none;
  background:#1a1a1a;
  color:white;
}

button{
  padding:10px;
  margin:5px;
  background:#a855f7;
  border:none;
  color:white;
  border-radius:8px;
  cursor:pointer;
}

/* IDEAS */
.card{
  background:#111;
  border:1px solid #333;
  margin:10px auto;
  padding:12px;
  max-width:600px;
  border-radius:10px;
}

.leader{
  border:2px solid gold;
}

/* BAR */
.bar{
  height:10px;
  background:#222;
  border-radius:10px;
  overflow:hidden;
}

.fill{
  height:100%;
  background:linear-gradient(90deg,#a855f7,gold);
}

/* PHOTOS */
.feed{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
  gap:10px;
  padding:10px;
}

.photo{
  width:100%;
  aspect-ratio:1/1;
  object-fit:cover;
  border-radius:10px;
}

/* GAME */
.game{
  text-align:center;
  padding:20px;
}

.target{
  font-size:50px;
  cursor:pointer;
}

</style>
</head>

<body>

<header>
  <div>🗳️ MAVRIC ELECTION PLATFORM</div>
  <div class="live">🔴 LIVE</div>
</header>

<!-- LOGIN -->
<div class="center">
  <button onclick="login()">Login with Google</button>
  <button onclick="logout()">Logout</button>
  <div id="user"></div>
</div>

<!-- IDEA INPUT -->
<div class="center">
  <input id="ideaInput" placeholder="Add your idea..."/>
  <button onclick="addIdea()">Post Idea</button>
</div>

<!-- IDEAS -->
<div id="ideas"></div>

<!-- PHOTOS -->
<div class="center">
  <h3>📸 Supporter Photos</h3>
  <input type="file" id="files" multiple/>
  <input id="caption" placeholder="Caption"/>
  <button onclick="upload()">Upload</button>
</div>

<div class="feed" id="feed"></div>

<!-- GAME -->
<div class="game">
  <h2>🎮 Click Rush</h2>
  <button onclick="startGame()">Start</button>
  <div class="target" onclick="hit()">⭐</div>
  <h3 id="score">0</h3>
</div>

<script>

/* =====================
   SUPABASE
===================== */
const client = supabase.createClient(
  "https://didfhlfvdvurkfwbipli.supabase.co",
  "sb_publishable_H6LVD2AlVaJ6SvHToXorgw_4ozq4FT0"
);

/* =====================
   AUTH (FIXED)
===================== */
let user = null;

client.auth.getSession().then(({ data }) => {
  user = data.session?.user || null;
  updateUser();
});

client.auth.onAuthStateChange((_, session) => {
  user = session?.user || null;
  updateUser();
});

function updateUser(){
  document.getElementById("user").innerText =
    user ? `Logged in: ${user.email}` : "Not logged in";
}

async function login(){
  await client.auth.signInWithOAuth({ provider: "google" });
}

async function logout(){
  await client.auth.signOut();
}

/* =====================
   IDEAS
===================== */

async function addIdea(){
  if(!user){
    alert("You must log in");
    return;
  }

  const text = document.getElementById("ideaInput").value;
  if(!text) return;

  await client.from("ideas").insert({
    text,
    votes:0,
    voters:[]
  });

  document.getElementById("ideaInput").value="";
  loadIdeas();
}

/* 🔐 LOGIN-LOCKED VOTING (FIXED) */
async function vote(id, votes, voters = []){

  if(!user){
    alert("Login required to vote");
    return;
  }

  const uid = user.id;

  const safeVoters = Array.isArray(voters) ? voters : [];

  if(safeVoters.includes(uid)){
    alert("You already voted");
    return;
  }

  const updated = [...safeVoters, uid];

  const { error } = await client.from("ideas")
    .update({
      votes: votes + 1,
      voters: updated
    })
    .eq("id", id);

  if(error){
    console.log(error);
    alert("Vote failed (check Supabase RLS)");
    return;
  }

  loadIdeas();
}

async function loadIdeas(){
  const {data} = await client.from("ideas").select("*");
  if(!data) return;

  const sorted = data.sort((a,b)=>(b.votes||0)-(a.votes||0));
  const total = Math.max(sorted.reduce((a,b)=>a+(b.votes||0),0),1);

  document.getElementById("ideas").innerHTML =
    sorted.map((i,index)=>{
      const percent = ((i.votes||0)/total*100).toFixed(1);

      return `
        <div class="card ${index===0?"leader":""}">
          <b>#${index+1}</b> 💡 ${i.text}
          <div>🗳️ ${i.votes||0} (${percent}%)</div>

          <div class="bar">
            <div class="fill" style="width:${percent}%"></div>
          </div>

          <button onclick='vote("${i.id}",${i.votes||0},${JSON.stringify(i.voters||[])})'>
            Vote
          </button>
        </div>
      `;
    }).join("");
}

/* =====================
   PHOTOS
===================== */

async function upload(){
  if(!user){
    alert("Login required");
    return;
  }

  const files=document.getElementById("files").files;
  const caption=document.getElementById("caption").value;

  for(let i=0;i<Math.min(files.length,25);i++){
    const file=files[i];
    const name=Date.now()+"-"+file.name;

    await client.storage.from("campaign").upload(name,file);

    const url=client.storage.from("campaign")
      .getPublicUrl(name).data.publicUrl;

    await client.from("photos").insert({url,caption});
  }

  loadPhotos();
}

async function loadPhotos(){
  const {data}=await client.from("photos").select("*");
  if(!data)return;

  document.getElementById("feed").innerHTML=
    data.map(p=>`<img class="photo" src="${p.url}"/>`).join("");
}

/* =====================
   GAME
===================== */
let score=0;
let running=false;

function startGame(){
  score=0;
  running=true;
  document.getElementById("score").innerText=0;

  let time=10;

  const t=setInterval(()=>{
    time--;
    if(time<=0){
      clearInterval(t);
      running=false;
      alert("Score: "+score);
    }
  },1000);
}

function hit(){
  if(!running)return;
  score++;
  document.getElementById("score").innerText=score;
}

/* =====================
   INIT
===================== */
loadIdeas();
loadPhotos();

setInterval(loadIdeas,3000);

</script>

</body>
</html>
