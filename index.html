<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mavric Platform</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0b12;
  color:white;
  text-align:center;
}

#status{
  padding:10px;
  background:#111;
  color:#a855f7;
}

button{
  padding:10px;
  margin:6px;
  background:#a855f7;
  border:none;
  border-radius:8px;
  color:white;
  cursor:pointer;
}

input{
  padding:10px;
  margin:6px;
  border-radius:8px;
  border:none;
  background:#1a1a1a;
  color:white;
}

.card{
  background:#111;
  margin:10px auto;
  padding:10px;
  border-radius:10px;
  max-width:500px;
}

.star{
  font-size:50px;
  cursor:pointer;
}
</style>
</head>

<body>

<div id="status">Starting...</div>

<h1>🗳️ MAVRIC PLATFORM</h1>

<button id="loginBtn">Login</button>
<button id="logoutBtn">Logout</button>

<div id="user">Not logged in</div>

<h3>💡 Ideas</h3>

<input id="ideaInput" placeholder="Idea"/>
<button id="postBtn">Post</button>

<div id="ideas"></div>

<h3>🎮 Game</h3>

<button id="startBtn">Start</button>
<div class="star" id="star">⭐</div>
<div id="score">0</div>

<script>
console.log("APP STARTED");

let client = null;
let user = null;
let running = false;
let score = 0;

/* BUTTONS ALWAYS WORK */
document.getElementById("loginBtn").onclick = () => {
  alert("Login clicked");

  if(!client){
    alert("Backend not ready");
    return;
  }

  client.auth.signInWithOAuth({provider:"google"});
};

document.getElementById("logoutBtn").onclick = () => {
  alert("Logout clicked");
  client?.auth.signOut();
};

document.getElementById("postBtn").onclick = async () => {
  alert("Post clicked");

  if(!client) return alert("Backend not ready");
  if(!user) return alert("Login first");

  const text = document.getElementById("ideaInput").value;
  if(!text) return;

  await client.from("ideas").insert({text, votes:0});
  loadIdeas();
};

/* GAME */
document.getElementById("startBtn").onclick = () => {
  alert("Game started");

  running = true;
  score = 0;
  document.getElementById("score").innerText = 0;

  setTimeout(()=>{
    running = false;
    alert("Score: " + score);
  }, 6000);
};

document.getElementById("star").onclick = () => {
  if(!running) return;
  score++;
  document.getElementById("score").innerText = score;
};

/* INIT SUPABASE */
window.onload = () => {

  if(!window.supabase){
    document.getElementById("status").innerText = "Supabase failed to load";
    return;
  }

  try{
    client = window.supabase.createClient(
      "https://didfhlfvdvurkfwbipli.supabase.co",
      "sb_publishable_H6LVD2AlVaJ6SvHToXorgw_4ozq4FT0"
    );

    document.getElementById("status").innerText = "Connected";

    client.auth.onAuthStateChange((_,session)=>{
      user = session?.user || null;
      document.getElementById("user").innerText =
        user ? user.email : "Not logged in";
    });

    loadIdeas();

  } catch(e){
    console.error(e);
    document.getElementById("status").innerText = "Supabase error";
  }
};

/* LOAD IDEAS */
async function loadIdeas(){

  if(!client) return;

  const {data} = await client.from("ideas").select("*");

  document.getElementById("ideas").innerHTML =
    (data || []).map(i=>`
      <div class="card">
        💡 ${i.text}
        <div>🗳️ ${i.votes||0}</div>
      </div>
    `).join("");
}

</script>

</body>
</html>
