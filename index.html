<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CNN Election V14 Locked</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#070812;
  color:white;
}

/* HEADER */
header{
  padding:10px;
  background:#111;
  border-bottom:2px solid #a855f7;
  display:flex;
  justify-content:space-between;
}

/* LAYOUT */
.container{
  display:grid;
  grid-template-columns:1fr 1fr;
  height:calc(100vh - 120px);
}

.panel{
  padding:10px;
  background:#0b0c18;
  overflow:auto;
  border-right:1px solid #222;
}

.screen{
  padding:10px;
}

/* INPUTS */
input{
  width:70%;
  padding:10px;
  border-radius:8px;
  border:none;
  background:#1a1a1a;
  color:white;
}

button{
  padding:10px;
  margin:5px;
  background:#a855f7;
  border:none;
  border-radius:8px;
  color:white;
  cursor:pointer;
}

/* CARDS */
.card{
  background:#111;
  padding:10px;
  margin:10px 0;
  border-radius:10px;
  border:1px solid #222;
}

/* CNN IMAGE FIX (NO STRETCH EVER) */
.imgBox{
  width:100%;
  aspect-ratio:16/9;
  overflow:hidden;
  border-radius:10px;
  margin-top:10px;
  background:#000;
}

.imgBox img{
  width:100%;
  height:100%;
  object-fit:cover;
  object-position:center;
  display:block;
}

/* STATUS */
#status{
  color:#00ff99;
}
</style>
</head>

<body>

<header>
  <div>📺 CNN ELECTION V14</div>
  <div id="status">STARTING...</div>
</header>

<div style="padding:10px;background:#0b0c18;">
  <button onclick="login()">🔐 Login</button>
  <button onclick="logout()">Logout</button>
  <div id="user">Not logged in</div>
</div>

<div class="container">

  <!-- LEFT PANEL -->
  <div class="panel">

    <h3>💡 Ideas</h3>

    <input id="ideaInput" placeholder="Enter idea"/>
    <button onclick="postIdea()">Post</button>

    <div id="ideas"></div>

  </div>

  <!-- RIGHT PANEL -->
  <div class="screen">

    <h3>🏆 Leader</h3>
    <div id="leader"></div>

    <h3>📸 Images</h3>

    <input type="file" id="file"/>
    <button onclick="uploadImage()">Upload Image</button>

    <div id="images"></div>

  </div>

</div>

<script>

let client;
let user = null;

/* YOUR OWNER ID (LOCK) */
const OWNER_ID = "18d43a56-6376-458e-9301-add699803f40";

/* INIT */
window.onload = async () => {

  client = window.supabase.createClient(
    "https://didfhlfvdvurkfwbipli.supabase.co",
    "sb_publishable_H6LVD2AlVaJ6SvHToXorgw_4ozq4FT0"
  );

  const { data } = await client.auth.getUser();
  user = data?.user || null;

  updateUser();

  loadIdeas();
  loadImages();

  document.getElementById("status").innerText = "LIVE";
};

/* AUTH */
async function login(){
  await client.auth.signInWithOAuth({
    provider:"google",
    options:{ redirectTo: window.location.origin }
  });
}

async function logout(){
  await client.auth.signOut();
  user = null;
  updateUser();
}

function updateUser(){
  document.getElementById("user").innerText =
    user ? `Logged in: ${user.email}` : "Not logged in";
}

/* POST IDEA */
async function postIdea(){

  if(!user){
    alert("Login required");
    return;
  }

  const text = document.getElementById("ideaInput").value;
  if(!text) return;

  await client.from("ideas").insert({
    text,
    votes:0
  });

  document.getElementById("ideaInput").value="";
  loadIdeas();
}

/* VOTE (ONE PER USER PER IDEA) */
async function vote(id){

  if(!user){
    alert("Login required");
    return;
  }

  const { data: existing } = await client
    .from("votes")
    .select("*")
    .eq("user_id", user.id)
    .eq("idea_id", id)
    .maybeSingle();

  if(existing){
    alert("Already voted");
    return;
  }

  await client.from("votes").insert({
    user_id: user.id,
    idea_id: id
  });

  const { data } = await client
    .from("ideas")
    .select("votes")
    .eq("id", id)
    .single();

  await client
    .from("ideas")
    .update({ votes:(data.votes||0)+1 })
    .eq("id", id);

  loadIdeas();
}

/* LOAD IDEAS */
async function loadIdeas(){

  const { data } = await client.from("ideas").select("*");

  if(!data) return;

  const sorted = data.sort((a,b)=>(b.votes||0)-(a.votes||0));

  document.getElementById("ideas").innerHTML = sorted.map(i=>`
    <div class="card">
      💡 ${i.text}<br>
      🗳️ ${i.votes||0}
      <button onclick="vote('${i.id}')">Vote</button>
    </div>
  `).join("");

  document.getElementById("leader").innerHTML =
    sorted[0] ? `🏆 ${sorted[0].text}` : "None";
}

/* IMAGE UPLOAD (OWNER ONLY) */
async function uploadImage(){

  if(!user){
    alert("Login required");
    return;
  }

  if(user.id !== OWNER_ID){
    alert("Only Mavric can upload images");
    return;
  }

  const file = document.getElementById("file").files[0];
  if(!file) return;

  const name = Date.now() + "-" + file.name;

  const { error } = await client.storage
    .from("campaign")
    .upload(name, file);

  if(error){
    console.log(error.message);
    return;
  }

  const url = client.storage
    .from("campaign")
    .getPublicUrl(name).data.publicUrl;

  await client.from("images").insert({ url });

  loadImages();
}

/* LOAD IMAGES */
async function loadImages(){

  const { data } = await client.from("images").select("*");

  document.getElementById("images").innerHTML =
    (data || []).map(i=>`
      <div class="imgBox">
        <img src="${i.url}">
      </div>
    `).join("");
}

</script>

</body>
</html>
