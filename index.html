<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mavric Campaign</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0b0f;
  color:white;
}

header{
  position:sticky;
  top:0;
  padding:14px;
  text-align:center;
  background:#111;
  color:#a855f7;
  font-weight:bold;
}

.section{
  padding:20px;
  text-align:center;
}

input, button{
  width:90%;
  max-width:350px;
  padding:12px;
  margin:8px auto;
  border-radius:10px;
  border:none;
  display:block;
}

button{
  background:#a855f7;
  color:white;
  font-weight:bold;
}

.idea, .photo{
  background:#151515;
  padding:12px;
  margin:10px auto;
  max-width:500px;
  border-radius:12px;
  border:1px solid #222;
}

.feed{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}

.photo img{
  width:100%;
  height:140px;
  object-fit:cover;
  border-radius:10px;
}

#timer{
  color:#a855f7;
  font-size:18px;
}

.voting-day{
  color:gold;
  font-size:22px;
  text-shadow:0 0 10px gold;
}
</style>
</head>

<body>

<header>🗳️ Mavric Campaign</header>

<div class="section">
  <h2>Your Voice. Your Vote.</h2>
  <div id="timer"></div>
</div>

<div class="section">
  <h2>💡 Ideas</h2>
  <input id="ideaInput" placeholder="Submit idea">
  <button onclick="submitIdea()">Submit</button>
  <div id="ideas"></div>
</div>

<div class="section">
  <h2>📸 Photo Feed</h2>

  <input type="file" id="fileInput">
  <input id="captionInput" placeholder="Caption">
  
  <!-- PASSWORD BOX -->
  <input id="adminPass" type="password" placeholder="Admin password">

  <button onclick="uploadPhoto()">Upload</button>

  <div class="feed" id="feed"></div>
</div>

<script>

/* =========================
   SUPABASE
========================= */
const SUPABASE_URL = "https://didfhlfvdvurkfwbipli.supabase.co";
const SUPABASE_KEY = "sb_publishable_H6LVD2AlVaJ6SvHToXorgw_4ozq4FT0";
const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

/* =========================
   SIMPLE PASSWORD (CHANGE THIS)
========================= */
const ADMIN_PASSWORD = "mavric123";

/* =========================
   TIMER
========================= */
const end = new Date("2026-04-24T00:00:00");

function updateTimer(){
  const diff = end - new Date();
  const el = document.getElementById("timer");

  if(diff <= 0){
    el.innerHTML = `<div class="voting-day">🗳️ VOTING DAY IS HERE</div>`;
    return;
  }

  const d = Math.floor(diff/86400000);
  const h = Math.floor(diff/3600000)%24;
  const m = Math.floor(diff/60000)%60;

  el.innerHTML = `⏳ ${d}d ${h}h ${m}m`;
}

/* =========================
   IDEAS
========================= */
async function loadIdeas(){
  const { data } = await client.from("ideas").select("*");

  document.getElementById("ideas").innerHTML =
    (data || []).map(i => `<div class="idea">💡 ${i.text}</div>`).join("");
}

async function submitIdea(){
  const text = document.getElementById("ideaInput").value;
  if(!text) return;

  await client.from("ideas").insert({ text });

  document.getElementById("ideaInput").value = "";
  loadIdeas();

  confetti({particleCount:80, spread:60});
}

/* =========================
   PHOTO UPLOAD (PASSWORD PROTECTED)
========================= */
async function uploadPhoto(){

  const pass = document.getElementById("adminPass").value;

  if(pass !== ADMIN_PASSWORD){
    alert("Wrong admin password!");
    return;
  }

  const file = fileInput.files[0];
  const caption = captionInput.value;

  if(!file) return alert("Select a file first");

  const fileName = Date.now() + "-" + file.name;

  const { error } = await client.storage
    .from("campaign")
    .upload(fileName, file);

  if(error){
    alert(error.message);
    return;
  }

  const url = client.storage
    .from("campaign")
    .getPublicUrl(fileName).data.publicUrl;

  await client.from("photos").insert({
    url,
    caption
  });

  fileInput.value = "";
  captionInput.value = "";
  document.getElementById("adminPass").value = "";

  loadPhotos();
}

/* =========================
   PHOTOS
========================= */
async function loadPhotos(){
  const { data } = await client.from("photos").select("*");

  document.getElementById("feed").innerHTML =
    (data || []).map(p => `
      <div class="photo">
        <img src="${p.url}">
        <div>${p.caption || ""}</div>
      </div>
    `).join("");
}

/* INIT */
loadIdeas();
loadPhotos();
updateTimer();

setInterval(updateTimer, 1000);
setInterval(loadIdeas, 5000);
setInterval(loadPhotos, 5000);

</script>

</body>
</html>
