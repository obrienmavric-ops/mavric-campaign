<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{margin:0;font-family:Arial;background:#0b0b0f;color:white;text-align:center}
.glass{background:rgba(255,255,255,0.05);margin:20px;padding:20px;border-radius:15px}
button{background:#a855f7;color:white;border:none;padding:10px;border-radius:8px}

/* images */
.feed{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px}
.feed img{width:100%;height:150px;object-fit:cover;border-radius:10px}

/* game */
canvas{background:#111;border-radius:10px}
</style>
</head>

<body>

<div class="glass">
<button onclick="login()">Login</button>
<button onclick="logout()">Logout</button>
<div id="user"></div>
</div>

<div class="glass">
<h2>Mission</h2>
<p>Your voice matters. I turn ideas into action.</p>
</div>

<div class="glass">
<h2>Ideas</h2>
<input id="ideaInput"><button onclick="addIdea()">Post</button>
<div id="ideas"></div>
</div>

<div class="glass">
<h2>Photos</h2>
<input type="file" id="files" multiple>
<button onclick="upload()">Upload</button>
<div id="feed" class="feed"></div>
</div>

<div class="glass">
<h2>🎮 Game</h2>
<button onclick="startGame()">Start</button>
<h3 id="score">Score: 0</h3>
<canvas id="game" width="320" height="400"></canvas>

<h3>🏆 Leaderboard</h3>
<div id="leaderboard"></div>
</div>

<script>
const client = supabase.createClient("YOUR_URL","YOUR_KEY");

let currentUser=null;

/* ===== AUTH ===== */
function getName(u){
  return (u.user_metadata?.full_name||u.email).split(" ")[0];
}
async function login(){await client.auth.signInWithOAuth({provider:'google'})}
async function logout(){await client.auth.signOut();location.reload()}
async function getUser(){
  const {data}=await client.auth.getUser();
  currentUser=data.user;
  document.getElementById("user").innerText=
    currentUser?"Hi "+getName(currentUser):"Not logged in";
}
getUser();

/* ===== IDEAS ===== */
async function addIdea(){
  if(!currentUser)return alert("Login");
  const text=document.getElementById("ideaInput").value;
  await client.from("ideas").insert({text,user:getName(currentUser)});
  loadIdeas();
}
async function loadIdeas(){
  const {data}=await client.from("ideas").select("*");
  document.getElementById("ideas").innerHTML=
    data.map(i=>`<div>${i.text} - ${i.user}</div>`).join("");
}
loadIdeas();

/* ===== PHOTOS ===== */
const PASSWORD="mavric123";

async function upload(){
  if(prompt("Password")!==PASSWORD)return;
  const files=document.getElementById("files").files;

  for(let f of files){
    const name=Date.now()+f.name;
    await client.storage.from("campaign").upload(name,f);
    const {data}=client.storage.from("campaign").getPublicUrl(name);
    await client.from("photos").insert({url:data.publicUrl});
  }
  loadPhotos();
}

async function loadPhotos(){
  const {data}=await client.from("photos").select("*");
  document.getElementById("feed").innerHTML=
    data.map(p=>`<img src="${p.url}">`).join("");
}
loadPhotos();

/* ===== GAME ===== */
const c=document.getElementById("game");
const ctx=c.getContext("2d");

let items=[],particles=[];
let score=0,combo=0,running=false;
let multiplier=1,slow=false;

const pop=new Audio("https://actions.google.com/sounds/v1/cartoon/pop.ogg");

/* start */
function startGame(){
  items=[];particles=[];
  score=0;combo=0;
  multiplier=1;slow=false;
  running=true;
  spawn();loop();
}

/* spawn */
function spawn(){
  if(!running)return;

  let type="vote";
  const r=Math.random();
  if(r>0.9) type="x2";
  else if(r>0.8) type="slow";
  else if(r>0.7) type="rain";

  items.push({
    x:Math.random()*300,
    y:0,
    type,
    speed: slow?1:2+Math.random()*2
  });

  setTimeout(spawn,700);
}

/* click */
c.addEventListener("pointerdown",e=>{
  if(!running)return;

  const rect=c.getBoundingClientRect();
  const mx=e.clientX-rect.left;
  const my=e.clientY-rect.top;

  items=items.filter(item=>{
    const hit=Math.abs(mx-item.x)<20 && Math.abs(my-item.y)<20;

    if(hit){
      pop.currentTime=0;
      pop.play();

      // POWER UPS
      if(item.type==="vote"){
        combo++;
        score+=combo*multiplier;
      }

      if(item.type==="x2"){
        multiplier=2;
        setTimeout(()=>multiplier=1,5000);
      }

      if(item.type==="slow"){
        slow=true;
        setTimeout(()=>slow=false,5000);
      }

      if(item.type==="rain"){
        for(let i=0;i<10;i++){
          items.push({x:Math.random()*300,y:0,type:"vote",speed:3});
        }
      }

      // particles
      for(let i=0;i<8;i++){
        particles.push({
          x:mx,y:my,
          dx:(Math.random()-0.5)*3,
          dy:(Math.random()-0.5)*3,
          life:20
        });
      }

      document.getElementById("score").innerText=
        "Score "+score+" x"+multiplier+" Combo "+combo;
    }

    return !hit;
  });
});

/* loop */
function loop(){
  if(!running)return;

  ctx.clearRect(0,0,320,400);

  items.forEach(i=>{
    i.y+=i.speed;

    let emoji="🗳️";
    if(i.type==="x2") emoji="⚡";
    if(i.type==="slow") emoji="🐢";
    if(i.type==="rain") emoji="🌧️";

    ctx.fillText(emoji,i.x,i.y);

    if(i.y>400){
      combo=0;
      i.y=-20;
    }
  });

  particles.forEach(p=>{
    p.x+=p.dx;
    p.y+=p.dy;
    p.life--;
    ctx.fillStyle="gold";
    ctx.fillRect(p.x,p.y,3,3);
  });

  particles=particles.filter(p=>p.life>0);

  requestAnimationFrame(loop);
}

/* ===== LEADERBOARD ===== */
async function endGame(){
  running=false;

  if(currentUser){
    await client.from("scores").insert({
      name:getName(currentUser),
      score
    });
  }

  loadLeaderboard();
}

async function loadLeaderboard(){
  const {data}=await client
    .from("scores")
    .select("*")
    .order("score",{ascending:false})
    .limit(5);

  document.getElementById("leaderboard").innerHTML=
    data.map((p,i)=>`#${i+1} ${p.name} - ${p.score}`).join("<br>");
}

loadLeaderboard();
</script>

</body>
</html>
