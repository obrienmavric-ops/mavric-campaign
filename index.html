<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mavric Campaign V4</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
<style>
/* =========================
   🌌 GLOBAL RESET + THEME
========================= */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family: Arial, Helvetica, sans-serif;
  color:white;
  overflow-x:hidden;

  /* animated gradient background */
  background: linear-gradient(-45deg, #0a0a0a, #111827, #1e1b4b, #0f172a);
  background-size: 400% 400%;
  animation: gradientShift 18s ease infinite;
}

@keyframes gradientShift{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

/* =========================
   🧠 HEADER (CLEAN + PREMIUM)
========================= */
header{
  position:sticky;
  top:0;
  z-index:100;

  background: rgba(10,10,10,0.75);
  backdrop-filter: blur(12px);

  padding:14px;
  text-align:center;

  font-weight:700;
  letter-spacing:1px;

  border-bottom:1px solid rgba(255,255,255,0.08);
}

/* =========================
   📦 LAYOUT SECTIONS
========================= */
.section{
  padding:28px 18px;
  max-width:900px;
  margin:auto;
  text-align:center;
}

/* section headings */
h2{
  margin-bottom:12px;
  font-size:22px;
}

/* =========================
   🎬 HERO INTRO SECTION
========================= */
.hero{
  margin-top:20px;
  padding:40px 20px;

  background: rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:18px;

  backdrop-filter: blur(10px);

  animation: fadeUp 1s ease forwards;
}

@keyframes fadeUp{
  from{
    opacity:0;
    transform: translateY(20px);
  }
  to{
    opacity:1;
    transform: translateY(0);
  }
}

/* =========================
   ⏳ TIMER (BIG IMPACT)
========================= */
#timer{
  font-size:20px;
  margin-top:10px;
  color:#a855f7;
  font-weight:600;
}

.voting-day{
  font-size:26px;
  font-weight:800;
  color:#facc15;
  text-shadow:0 0 20px rgba(250,204,21,0.6);
  animation:pulse 1.5s infinite;
}

@keyframes pulse{
  0%{transform:scale(1)}
  50%{transform:scale(1.05)}
  100%{transform:scale(1)}
}

/* =========================
   ✨ INPUT SYSTEM (MODERN)
========================= */
input, button{
  width:100%;
  max-width:360px;
  padding:12px 14px;
  margin:8px auto;

  border-radius:12px;
  border:1px solid rgba(255,255,255,0.08);

  display:block;

  background: rgba(255,255,255,0.05);
  color:white;

  outline:none;
}

input:focus{
  border-color:#a855f7;
}

button{
  background: linear-gradient(135deg, #a855f7, #6366f1);
  font-weight:600;
  cursor:pointer;
  transition:0.2s ease;
}

button:hover{
  transform: scale(1.03);
}

/* =========================
   💡 IDEA CARDS (CLEAN + SHARP)
========================= */
.idea{
  background: rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);

  padding:14px;
  margin:12px auto;

  max-width:520px;
  border-radius:14px;

  text-align:left;

  transition:0.2s ease;
}

.idea:hover{
  transform: translateY(-3px);
  border-color: rgba(168,85,247,0.5);
}

/* =========================
   📸 IMAGE FEED (NO STRETCHING EVER)
========================= */
.feed{
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap:12px;
}

.photo{
  background: rgba(255,255,255,0.04);
  border-radius:14px;
  overflow:hidden;

  border:1px solid rgba(255,255,255,0.08);
}

/* FIX: NO WARP / NO STRETCH */
.photo img{
  width:100%;
  height:180px;
  object-fit:cover;
  display:block;
}

.photo div{
  padding:8px;
  font-size:13px;
  opacity:0.9;
}

/* =========================
   🔢 LIVE COUNTER STYLE
========================= */
.counter{
  font-weight:800;
  color:#a855f7;
  transition:0.2s ease;
}

.counter.bump{
  transform: scale(1.3);
  color:#60a5fa;
}

/* =========================
   👀 SCROLL REVEAL SYSTEM
========================= */
.reveal{
  opacity:0;
  transform: translateY(35px);
  transition: all 0.8s ease;
}

.reveal.active{
  opacity:1;
  transform: translateY(0);
}

/* =========================
   📱 MOBILE POLISH
========================= */
@media (max-width:600px){
  .section{
    padding:20px 12px;
  }

  header{
    font-size:14px;
  }
}
</style>
<script>

const SUPABASE_URL = "https://didfhlfvdvurkfwbipli.supabase.co";
const SUPABASE_KEY = "sb_publishable_H6LVD2AlVaJ6SvHToXorgw_4ozq4FT0";
const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const UPLOAD_PASSWORD = "mavric123";

let userId = localStorage.getItem("userId");
if(!userId){
  userId = Math.random().toString(36).substring(2);
  localStorage.setItem("userId", userId);
}

/* COUNTDOWN */
const end = new Date("2026-04-24T00:00:00");

function updateTimer(){
  const diff = end - new Date();

  if(diff <= 0){
    document.getElementById("timer").innerHTML = "🗳️ VOTING DAY IS HERE!";
    return;
  }

  const d = Math.floor(diff/86400000);
  const h = Math.floor(diff/3600000)%24;
  const m = Math.floor(diff/60000)%60;

  document.getElementById("timer").innerHTML =
  `${d}d ${h}h ${m}m left`;
}

/* LOAD IDEAS */
async function loadIdeas(){
  const { data } = await client.from("ideas").select("*");
  if(!data) return;

  const sorted = [...data].sort((a,b)=>(b.votes||0)-(a.votes||0));

  document.getElementById("trending").innerHTML =
    sorted.slice(0,3).map(renderIdea).join("");

  document.getElementById("ideas").innerHTML =
    sorted.map(renderIdea).join("");
}

/* RENDER IDEA */
function renderIdea(i){
  return `
  <div class="idea ${i.votes > 5 ? "trending" : ""}">
    💡 ${i.text}<br><br>
    🗳️ ${i.votes || 0} votes

    <div class="voteBtn" onclick="vote('${i.id}')">
      👍 Vote
    </div>
  </div>
  `;
}

/* VOTE (1 per user per idea) */
async function vote(id){

  let voted = JSON.parse(localStorage.getItem("votes") || "{}");
  if(voted[id]) return alert("You already voted on this idea!");

  const { data } = await client.from("ideas").select("*").eq("id", id).single();

  await client.from("ideas")
    .update({ votes: (data.votes || 0) + 1 })
    .eq("id", id);

  voted[id] = true;
  localStorage.setItem("votes", JSON.stringify(voted));

  loadIdeas();
  confetti({particleCount:60, spread:70});
}

/* SUBMIT IDEA */
async function submitIdea(){
  const text = document.getElementById("ideaInput").value;
  if(!text) return;

  await client.from("ideas").insert({ text, votes:0 });

  document.getElementById("ideaInput").value = "";
  loadIdeas();

  confetti();
}

/* PHOTO UPLOAD */
async function uploadPhoto(){

  const pass = document.getElementById("uploadPass").value;
  if(pass !== UPLOAD_PASSWORD){
    alert("Wrong password!");
    return;
  }

  const files = fileInput.files;
  const caption = captionInput.value;

  if(!files.length) return;

  const limit = Math.min(files.length, 25);

  for(let i=0;i<limit;i++){
    const file = files[i];
    const name = Date.now()+"-"+file.name;

    const { error } = await client.storage
      .from("campaign")
      .upload(name, file);

    if(error){
      alert(error.message);
      return;
    }

    const url = client.storage
      .from("campaign")
      .getPublicUrl(name).data.publicUrl;

    await client.from("photos").insert({
      url,
      caption
    });
  }

  loadPhotos();
}

/* LOAD PHOTOS */
async function loadPhotos(){
  const { data } = await client.from("photos").select("*");
  if(!data) return;

  document.getElementById("feed").innerHTML =
    data.map(p=>`
      <div class="photo">
        <img src="${p.url}">
        <div>${p.caption || ""}</div>
      </div>
    `).join("");
}

/* INIT */
loadIdeas();
loadPhotos();
updateTimer();

setInterval(updateTimer,1000);
setInterval(loadIdeas,4000);
setInterval(loadPhotos,4000);

</script>

</body>
</html>
