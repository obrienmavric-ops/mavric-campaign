<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mavric Election CNN V9</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#070812;
  color:white;
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  padding:10px;
  background:#111;
  border-bottom:2px solid #a855f7;
}

#live{
  color:red;
  font-weight:bold;
  animation:blink 1s infinite;
}
@keyframes blink{50%{opacity:0.3;}}

.container{
  display:grid;
  grid-template-columns:1fr 1.2fr;
  height:calc(100vh - 140px);
}

/* PANELS */
.panel{
  padding:10px;
  background:#0b0c18;
  overflow:auto;
  border-right:1px solid #222;
}

.screen{
  padding:10px;
}

/* INPUTS */
input{
  padding:10px;
  width:70%;
  border-radius:8px;
  border:none;
  background:#1a1a1a;
  color:white;
}

button{
  padding:10px;
  margin:5px;
  background:#a855f7;
  border:none;
  border-radius:8px;
  color:white;
  cursor:pointer;
}

/* CARDS */
.card{
  background:#111;
  margin:10px 0;
  padding:10px;
  border-radius:10px;
}

/* IMAGE GRID */
.images{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
  gap:10px;
}

.images img{
  width:100%;
  height:120px;
  object-fit:cover;
  border-radius:8px;
}

/* MISSION */
.mission{
  background:linear-gradient(90deg,#a855f7,#111);
  padding:10px;
  margin:10px;
  border-radius:10px;
  font-weight:bold;
}
</style>
</head>

<body>

<header>
  <div>📺 MAVRIC ELECTION CNN</div>
  <div id="live">● LIVE</div>
  <div id="status">STARTING...</div>
</header>

<!-- MISSION STATEMENT -->
<div class="mission">
  “Your Voice. My Actions. Real Change for Our School.”
</div>

<div style="padding:10px;background:#0b0c18;">
  <button onclick="login()">🔐 Login</button>
  <button onclick="logout()">Logout</button>
  <div id="user">Not logged in</div>
</div>

<div class="container">

  <!-- LEFT -->
  <div class="panel">

    <h3>💡 Ideas</h3>

    <input id="ideaInput" placeholder="Enter idea"/>
    <button onclick="postIdea()">Post</button>

    <div id="ideas"></div>

    <hr/>

    <h3>📸 Upload Images (Owner Only)</h3>

    <input type="file" id="file"/>
    <button onclick="uploadImage()">Upload Image</button>

  </div>

  <!-- RIGHT -->
  <div class="screen">

    <h2>📊 LIVE RESULTS</h2>
    <div id="topIdea"></div>

    <h3>🖼️ Campaign Feed</h3>
    <div class="images" id="gallery"></div>

  </div>

</div>

<script>

let client;
let user = null;

/* 🔒 PUT YOUR USER ID HERE */
const OWNER_ID = "18d43a56-6376-458e-9301-add699803f40";

/* INIT */
window.onload = async () => {

  client = window.supabase.createClient(
    "https://didfhlfvdvurkfwbipli.supabase.co",
    "sb_publishable_H6LVD2AlVaJ6SvHToXorgw_4ozq4FT0"
  );

  const { data } = await client.auth.getUser();
  user = data?.user || null;

  updateUser();

  loadIdeas();
  loadImages();

};

/* AUTH */
async function login(){
  await client.auth.signInWithOAuth({
    provider:"google",
    options:{ redirectTo: window.location.origin }
  });
}

async function logout(){
  await client.auth.signOut();
  user = null;
  updateUser();
}

function updateUser(){
  document.getElementById("user").innerText =
    user ? `Logged in: ${user.email}` : "Not logged in";
}

/* IDEAS */
async function postIdea(){

  if(!user) return alert("Login required");

  const text = document.getElementById("ideaInput").value;
  if(!text) return;

  await client.from("ideas").insert({
    text,
    votes:0
  });

  document.getElementById("ideaInput").value="";
  loadIdeas();
}

async function loadIdeas(){

  const { data } = await client.from("ideas").select("*");
  if(!data) return;

  const sorted = data.sort((a,b)=>(b.votes||0)-(a.votes||0));

  ideas.innerHTML = sorted.map(i=>`
    <div class="card">
      💡 ${i.text}
      <div>🗳️ ${i.votes||0}</div>
    </div>
  `).join("");

  topIdea.innerHTML =
    "🏆 Leader: <b>" + (sorted[0]?.text || "None") + "</b>";
}

/* IMAGE UPLOAD (ONLY OWNER) */
async function uploadImage(){

  if(!user) return alert("Login required");

  if(user.id !== OWNER_ID){
    return alert("Only Mavric can upload images");
  }

  const file = document.getElementById("file").files[0];
  if(!file) return;

  const name = Date.now() + "-" + file.name;

  await client.storage.from("campaign").upload(name, file);

  const url = client.storage.from("campaign")
    .getPublicUrl(name).data.publicUrl;

  await client.from("images").insert({
    url
  });

  loadImages();
}

/* LOAD IMAGES */
async function loadImages(){

  const { data } = await client.from("images").select("*");
  if(!data) return;

  gallery.innerHTML = data.map(i=>`
    <img src="${i.url}">
  `).join("");
}

</script>

</body>
</html>
