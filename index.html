<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mavric Election Platform</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0b12;
  color:white;
}

/* HEADER */
header{
  position:sticky;
  top:0;
  background:#111;
  padding:12px;
  display:flex;
  justify-content:space-between;
  border-bottom:1px solid #333;
}

.live{
  color:red;
  animation:blink 1s infinite;
}

@keyframes blink{50%{opacity:0.3}}

/* TICKER */
.ticker{
  white-space:nowrap;
  overflow:hidden;
  background:#1a0b2e;
  border-bottom:1px solid #333;
}
.ticker span{
  display:inline-block;
  padding:10px;
  animation:scroll 14s linear infinite;
}
@keyframes scroll{
  from{transform:translateX(100%)}
  to{transform:translateX(-100%)}
}

/* CENTER */
.center{
  text-align:center;
  padding:10px;
}

button{
  background:#a855f7;
  border:none;
  padding:10px;
  margin:5px;
  border-radius:8px;
  color:white;
  cursor:pointer;
}

input{
  padding:10px;
  width:90%;
  max-width:400px;
  border-radius:8px;
  border:none;
  margin:5px;
  background:#1a1a1a;
  color:white;
}

/* CARDS */
.card{
  background:#111;
  border:1px solid #333;
  padding:12px;
  margin:10px auto;
  max-width:600px;
  border-radius:10px;
}

.leader{
  border:2px solid gold;
}

/* BAR */
.bar{
  height:10px;
  background:#222;
  border-radius:10px;
  overflow:hidden;
}
.fill{
  height:100%;
  background:linear-gradient(90deg,#a855f7,gold);
}

/* PHOTO GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
  gap:10px;
  padding:10px;
}

.photo{
  width:100%;
  aspect-ratio:1/1;
  object-fit:cover;
  border-radius:10px;
}

/* GAME */
.game{
  text-align:center;
  padding:20px;
}

.star{
  font-size:50px;
  cursor:pointer;
}
</style>
</head>

<body>

<header>
  <div>🗳️ ELECTION LIVE</div>
  <div class="live">🔴 LIVE</div>
</header>

<div class="ticker">
  <span id="ticker">Loading trending ideas...</span>
</div>

<div class="center">
  <button onclick="login()">Login with Google</button>
  <button onclick="logout()">Logout</button>
  <div id="user"></div>
</div>

<div class="center">
  <input id="ideaInput" placeholder="Add idea..."/>
  <button onclick="addIdea()">Post</button>
</div>

<div id="ideas"></div>

<div class="center">
  <h2>📸 Photo Wall</h2>
  <input type="file" id="files" multiple/>
  <input id="caption" placeholder="caption"/>
  <button onclick="upload()">Upload</button>
</div>

<div class="grid" id="photos"></div>

<div class="game">
  <h2>🎮 Mavric Click Game</h2>
  <button onclick="startGame()">Start</button>
  <div class="star" onclick="hit()">⭐</div>
  <h3 id="score">0</h3>
</div>

<script>

/* 🔐 SUPABASE (FILL THESE) */
const supabase = window.supabase.createClient(
  "https://mavric-campaign.vercel.app/#",
  "sb_publishable_dyXZ9ewS0jo0SxQmX8i36g_nM0kOniSY"
);

let user=null;

/* LOGIN */
async function login(){
  await supabase.auth.signInWithOAuth({provider:"google"});
}

async function logout(){
  await supabase.auth.signOut();
}

supabase.auth.onAuthStateChange((_,session)=>{
  user=session?.user||null;
  document.getElementById("user").innerText =
    user ? "Logged in: "+user.email : "Not logged in";
});

/* IDEAS */
async function addIdea(){
  if(!user){alert("Login required");return;}

  const text=document.getElementById("ideaInput").value;
  if(!text)return;

  await supabase.from("ideas").insert({
    text,
    votes:0,
    user:user.email
  });

  document.getElementById("ideaInput").value="";
}

async function vote(id,v){
  await supabase.from("ideas")
    .update({votes:v+1})
    .eq("id",id);
}

async function loadIdeas(){
  const {data}=await supabase.from("ideas").select("*");
  if(!data)return;

  const sorted=data.sort((a,b)=>(b.votes||0)-(a.votes||0));
  const total=Math.max(sorted.reduce((a,b)=>a+(b.votes||0),0),1);

  document.getElementById("ideas").innerHTML=
    sorted.map((i,index)=>{
      const percent=((i.votes||0)/total*100).toFixed(1);

      return `
      <div class="card ${index===0?"leader":""}">
        <b>#${index+1}</b> 💡 ${i.text}
        <div>🗳️ ${i.votes||0}</div>

        <div class="bar">
          <div class="fill" style="width:${percent}%"></div>
        </div>

        <button onclick="vote('${i.id}',${i.votes||0})">Vote</button>
      </div>`;
    }).join("");

  document.getElementById("ticker").innerText =
    sorted.slice(0,5).map(i=>i.text).join(" 🔥 ");
}

/* PHOTOS */
async function upload(){
  if(!user){alert("Login required");return;}

  const files=document.getElementById("files").files;
  const caption=document.getElementById("caption").value;

  for(let i=0;i<Math.min(files.length,25);i++){
    const file=files[i];
    const name=Date.now()+"-"+file.name;

    await supabase.storage.from("campaign").upload(name,file);

    const url=supabase.storage.from("campaign")
      .getPublicUrl(name).data.publicUrl;

    await supabase.from("photos").insert({url,caption});
  }

  loadPhotos();
}

async function loadPhotos(){
  const {data}=await supabase.from("photos").select("*");
  if(!data)return;

  document.getElementById("photos").innerHTML=
    data.map(p=>`<img class="photo" src="${p.url}">`).join("");
}

/* GAME */
let score=0;
let running=false;

function startGame(){
  score=0;
  running=true;
  document.getElementById("score").innerText=0;

  setTimeout(()=>{
    running=false;
    alert("Score: "+score);
  },10000);
}

function hit(){
  if(!running)return;
  score++;
  document.getElementById("score").innerText=score;
}

/* INIT */
loadIdeas();
loadPhotos();
setInterval(loadIdeas,3000);

</script>

</body>
</html>
