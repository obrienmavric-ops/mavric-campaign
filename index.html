<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Election System V7 Auth</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#070812;
  color:white;
  text-align:center;
}

header{
  padding:12px;
  background:#111;
  border-bottom:2px solid #a855f7;
}

button{
  padding:10px;
  margin:6px;
  background:#a855f7;
  border:none;
  border-radius:8px;
  color:white;
  cursor:pointer;
}

input{
  padding:10px;
  width:70%;
  border-radius:8px;
  border:none;
  background:#1a1a1a;
  color:white;
}

.card{
  background:#111;
  margin:10px auto;
  padding:10px;
  border-radius:10px;
  max-width:500px;
  text-align:left;
}

.badge{
  color:#00ff99;
  font-size:12px;
}
</style>
</head>

<body>

<header>
  🗳️ MAVRIC ELECTION SYSTEM
</header>

<div id="status">Starting...</div>

<button onclick="login()">🔐 Login with Google</button>
<button onclick="logout()">Logout</button>

<div id="user">Not logged in</div>

<hr/>

<h3>💡 Post Idea (Login Required)</h3>

<input id="ideaInput" placeholder="Your idea"/>
<button onclick="postIdea()">Post</button>

<h3>📊 Live Ideas</h3>
<div id="ideas"></div>

<script>

let client = null;
let currentUser = null;

/* INIT */
window.onload = async () => {

  client = window.supabase.createClient(
    "https://didfhlfvdvurkfwbipli.supabase.co",
    "sb_publishable_H6LVD2AlVaJ6SvHToXorgw_4ozq4FT0"
  );

  document.getElementById("status").innerText = "LIVE";

  const { data } = await client.auth.getUser();
  currentUser = data?.user || null;

  updateUserUI();
  loadIdeas();

  /* realtime updates */
  client.channel('ideas-live')
    .on('postgres_changes',
      { event:'*', schema:'public', table:'ideas' },
      () => loadIdeas()
    )
    .subscribe();
};

/* AUTH */
async function login(){
  await client.auth.signInWithOAuth({
    provider:"google",
    options:{
      redirectTo: window.location.origin
    }
  });
}

async function logout(){
  await client.auth.signOut();
  currentUser = null;
  updateUserUI();
}

/* USER UI */
function updateUserUI(){
  document.getElementById("user").innerText =
    currentUser
      ? `Logged in: ${currentUser.email}`
      : "Not logged in";
}

/* POST IDEA (LOCKED) */
async function postIdea(){

  if(!currentUser){
    alert("You must login to post");
    return;
  }

  const text = document.getElementById("ideaInput").value;
  if(!text) return;

  await client.from("ideas").insert({
    text,
    votes:0,
    created_by: currentUser.id
  });

  document.getElementById("ideaInput").value="";
  loadIdeas();
}

/* VOTE (1 PER USER PER IDEA) */
async function vote(idea_id){

  if(!currentUser){
    alert("Login required");
    return;
  }

  /* check if already voted */
  const { data: existing } = await client
    .from("votes")
    .select("*")
    .eq("user_id", currentUser.id)
    .eq("idea_id", idea_id)
    .single();

  if(existing){
    alert("You already voted on this idea");
    return;
  }

  /* record vote */
  await client.from("votes").insert({
    user_id: currentUser.id,
    idea_id
  });

  /* increment idea votes */
  const { data } = await client
    .from("ideas")
    .select("votes")
    .eq("id", idea_id)
    .single();

  await client
    .from("ideas")
    .update({ votes: (data.votes || 0) + 1 })
    .eq("id", idea_id);

  loadIdeas();
}

/* LOAD IDEAS */
async function loadIdeas(){

  const container = document.getElementById("ideas");

  const { data } = await client.from("ideas").select("*");
  if(!data) return;

  const sorted = data.sort((a,b)=>(b.votes||0)-(a.votes||0));

  container.innerHTML = sorted.map(i=>`
    <div class="card">
      <div>💡 ${i.text}</div>
      <div class="badge">🗳️ ${i.votes || 0} votes</div>

      <button onclick="vote('${i.id}')">Vote</button>
    </div>
  `).join("");
}

</script>

</body>
</html>
