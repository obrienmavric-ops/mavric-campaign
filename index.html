<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mavric Election Platform V6 Stable</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0b12;
  color:white;
  text-align:center;
}

header{
  padding:12px;
  background:#111;
  font-weight:bold;
}

#status{
  padding:10px;
  color:#a855f7;
}

button{
  padding:10px;
  margin:6px;
  background:#a855f7;
  border:none;
  border-radius:8px;
  color:white;
  cursor:pointer;
}

input{
  padding:10px;
  margin:6px;
  border-radius:8px;
  border:none;
  background:#1a1a1a;
  color:white;
  width:80%;
  max-width:300px;
}

.card{
  background:#111;
  margin:10px auto;
  padding:10px;
  border-radius:10px;
  max-width:500px;
}

.star{
  font-size:50px;
  cursor:pointer;
  user-select:none;
}
</style>
</head>

<body>

<header>🗳️ MAVRIC LIVE PLATFORM</header>

<div id="status">Starting...</div>

<!-- AUTH -->
<button id="loginBtn">Login</button>
<button id="logoutBtn">Logout</button>
<div id="user">Not logged in</div>

<!-- IDEAS -->
<h3>💡 Ideas</h3>
<input id="ideaInput" placeholder="Enter idea"/>
<br/>
<button id="postBtn">Post Idea</button>

<div id="ideas"></div>

<!-- GAME -->
<h3>🎮 Game</h3>
<button id="startBtn">Start Game</button>
<div class="star" id="star">⭐</div>
<div id="score">0</div>

<script>

/* =========================
   GLOBAL STATE
========================= */
let supabase = null;
let user = null;
let running = false;
let score = 0;

/* =========================
   INIT UI FIRST (ALWAYS WORKS)
========================= */
setupUI();

/* =========================
   SAFE BACKEND INIT
========================= */
setTimeout(initSupabase, 800);

function initSupabase(){

  if(!window.supabase){
    document.getElementById("status").innerText =
      "⚠️ Supabase failed to load (CDN issue)";
    return;
  }

  try{
    supabase = window.supabase.createClient(
      "PASTE_SUPABASE_URL",
      "PASTE_SUPABASE_ANON_KEY"
    );

    document.getElementById("status").innerText =
      "✅ Connected to backend";

    setupAuth();
    loadIdeas();

  } catch(e){
    console.error(e);
    document.getElementById("status").innerText =
      "❌ Supabase init error";
  }
}

/* =========================
   UI ALWAYS WORKS (NO FAILS)
========================= */
function setupUI(){

  document.getElementById("loginBtn").onclick = () => {
    if(!supabase){
      alert("Backend not ready yet");
      return;
    }
    supabase.auth.signInWithOAuth({provider:"google"});
  };

  document.getElementById("logoutBtn").onclick = () => {
    if(supabase) supabase.auth.signOut();
  };

  document.getElementById("postBtn").onclick = async () => {
    if(!supabase) return alert("Backend not ready");
    if(!user) return alert("Login first");

    const text = document.getElementById("ideaInput").value;
    if(!text) return;

    await supabase.from("ideas").insert({
      text,
      votes:0
    });

    document.getElementById("ideaInput").value="";
    loadIdeas();
  };

  document.getElementById("startBtn").onclick = startGame;
  document.getElementById("star").onclick = hit;
}

/* =========================
   AUTH
========================= */
function setupAuth(){
  supabase.auth.onAuthStateChange((_,session)=>{
    user = session?.user || null;
    document.getElementById("user").innerText =
      user ? user.email : "Not logged in";
  });
}

/* =========================
   IDEAS + VOTING
========================= */
async function loadIdeas(){
  if(!supabase) return;

  const {data} = await supabase.from("ideas").select("*");
  if(!data) return;

  document.getElementById("ideas").innerHTML =
    data.map(i=>`
      <div class="card">
        💡 ${i.text}
        <div>🗳️ ${i.votes||0}</div>
        <button onclick="vote('${i.id}')">Vote</button>
      </div>
    `).join("");
}

async function vote(id){

  if(!supabase) return;

  const {data} = await supabase.from("ideas")
    .select("votes")
    .eq("id",id)
    .single();

  await supabase.from("ideas")
    .update({votes:(data.votes||0)+1})
    .eq("id",id);

  loadIdeas();
}

/* =========================
   GAME (ALWAYS WORKS)
========================= */
function startGame(){
  running = true;
  score = 0;
  document.getElementById("score").innerText = 0;

  setTimeout(()=>{
    running = false;
    alert("Score: " + score);
  }, 8000);
}

function hit(){
  if(!running) return;
  score++;
  document.getElementById("score").innerText = score;
}

</script>

</body>
</html>
