<!DOCTYPE html>
<html>
<body>

<h1>BUTTON TEST</h1>

<button onclick="test()">CLICK ME</button>

<div id="ideas"></div>

<script>

console.log("SCRIPT LOADED");

function test(){
  alert("BUTTON WORKS");
}

/* FORCE CHECK DOM */
window.onload = () => {
  console.log("PAGE LOADED");

  const el = document.getElementById("ideas");

  if(!el){
    alert("ERROR: ideas div missing");
    return;
  }

  el.innerHTML = `
    <button onclick="alert('DYNAMIC BUTTON WORKS')">
      DYNAMIC BUTTON
    </button>
  `;
};

</script>

</body>
</html>
