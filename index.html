<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mavric Election Platform</title>

<style>

body{
  margin:0;
  font-family:Arial;
  background:#0a0a10;
  color:white;
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  padding:12px;
  background:#111;
  border-bottom:1px solid #333;
}

.live{
  color:red;
  font-weight:bold;
  animation:blink 1s infinite;
}
@keyframes blink{50%{opacity:0.3}}

/* CENTER */
.center{
  text-align:center;
  padding:10px;
}

input{
  width:90%;
  max-width:400px;
  padding:10px;
  margin:6px;
  border-radius:8px;
  border:none;
  background:#1a1a1a;
  color:white;
}

button{
  padding:10px;
  margin:5px;
  background:#a855f7;
  border:none;
  color:white;
  border-radius:8px;
  cursor:pointer;
}

/* CARDS */
.card{
  background:#111;
  border:1px solid #333;
  margin:10px auto;
  padding:12px;
  max-width:600px;
  border-radius:10px;
}

.leader{
  border:2px solid gold;
}

/* BAR */
.bar{
  height:10px;
  background:#222;
  border-radius:10px;
  overflow:hidden;
}

.fill{
  height:100%;
  background:linear-gradient(90deg,#a855f7,gold);
}

/* PHOTOS */
.feed{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
  gap:10px;
  padding:10px;
}

.photo{
  width:100%;
  aspect-ratio:1/1;
  object-fit:cover;
  border-radius:10px;
}

/* GAME */
.game{
  text-align:center;
  padding:20px;
}

.target{
  font-size:50px;
  cursor:pointer;
}

</style>
</head>

<body>

<header>
  <div>🗳️ MAVRIC ELECTION PLATFORM</div>
  <div class="live">🔴 LIVE</div>
</header>

<!-- FAKE LOGIN -->
<div class="center">
  <button onclick="login()">Login</button>
  <button onclick="logout()">Logout</button>
  <div id="user"></div>
</div>

<!-- IDEA INPUT -->
<div class="center">
  <input id="ideaInput" placeholder="Add your idea..."/>
  <button onclick="addIdea()">Post Idea</button>
</div>

<!-- IDEAS -->
<div id="ideas"></div>

<!-- PHOTOS -->
<div class="center">
  <h3>📸 Supporter Photos</h3>
  <input type="file" id="files" multiple/>
  <input id="caption" placeholder="Caption"/>
  <button onclick="upload()">Upload</button>
</div>

<div class="feed" id="feed"></div>

<!-- GAME -->
<div class="game">
  <h2>🎮 Click Rush</h2>
  <button onclick="startGame()">Start</button>
  <div class="target" onclick="hit()">⭐</div>
  <h3 id="score">0</h3>
</div>

<script>

/* =====================
   FAKE LOGIN SYSTEM
===================== */
let user = localStorage.getItem("user");

function login(){
  const name = prompt("Enter your name:");
  if(!name) return;

  user = name;
  localStorage.setItem("user", user);
  updateUser();
}

function logout(){
  user = null;
  localStorage.removeItem("user");
  updateUser();
}

function updateUser(){
  document.getElementById("user").innerText =
    user ? "Logged in as: " + user : "Not logged in";
}

updateUser();

/* =====================
   IDEAS (LOCAL STORAGE)
===================== */

let ideas = JSON.parse(localStorage.getItem("ideas") || "[]");

function saveIdeas(){
  localStorage.setItem("ideas", JSON.stringify(ideas));
}

function addIdea(){
  if(!user){
    alert("Login required");
    return;
  }

  const text = document.getElementById("ideaInput").value;
  if(!text) return;

  ideas.push({
    id: Date.now().toString(),
    text,
    votes:0,
    voters:[]
  });

  saveIdeas();
  document.getElementById("ideaInput").value="";
  loadIdeas();
}

/* VOTING (LOCKED PER USER NAME) */
function vote(id){
  if(!user){
    alert("Login required");
    return;
  }

  const idea = ideas.find(i=>i.id===id);
  if(!idea) return;

  if(idea.voters.includes(user)){
    alert("You already voted");
    return;
  }

  idea.votes++;
  idea.voters.push(user);

  saveIdeas();
  loadIdeas();
}

/* RENDER IDEAS */
function loadIdeas(){

  const sorted = [...ideas].sort((a,b)=>b.votes-a.votes);
  const total = Math.max(sorted.reduce((a,b)=>a+b.votes,0),1);

  document.getElementById("ideas").innerHTML =
    sorted.map((i,index)=>{

      const percent = ((i.votes/total)*100).toFixed(1);

      return `
        <div class="card ${index===0?"leader":""}">
          <b>#${index+1}</b> 💡 ${i.text}
          <div>🗳️ ${i.votes} (${percent}%)</div>

          <div class="bar">
            <div class="fill" style="width:${percent}%"></div>
          </div>

          <button onclick="vote('${i.id}')">Vote</button>
        </div>
      `;
    }).join("");
}

loadIdeas();

/* =====================
   PHOTOS (LOCAL ONLY)
===================== */

let photos = JSON.parse(localStorage.getItem("photos") || "[]");

function upload(){

  if(!user){
    alert("Login required");
    return;
  }

  const files = document.getElementById("files").files;
  const caption = document.getElementById("caption").value;

  for(let file of files){

    const reader = new FileReader();

    reader.onload = function(e){
      photos.push({
        url:e.target.result,
        caption
      });

      localStorage.setItem("photos", JSON.stringify(photos));
      loadPhotos();
    };

    reader.readAsDataURL(file);
  }
}

function loadPhotos(){
  document.getElementById("feed").innerHTML =
    photos.map(p=>`
      <img class="photo" src="${p.url}"/>
    `).join("");
}

loadPhotos();

/* =====================
   GAME
===================== */
let score=0;
let running=false;

function startGame(){
  score=0;
  running=true;
  document.getElementById("score").innerText=0;

  let time=10;

  const t=setInterval(()=>{
    time--;
    if(time<=0){
      clearInterval(t);
      running=false;
      alert("Score: "+score);
    }
  },1000);
}

function hit(){
  if(!running)return;
  score++;
  document.getElementById("score").innerText=score;
}

</script>

</body>
</html>
