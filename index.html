<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mavric Stable Fix</title>

<style>
body{background:#0b0b12;color:white;font-family:Arial;text-align:center;}
button{padding:10px;margin:10px;background:#a855f7;color:white;border:none;border-radius:8px;}
input{padding:10px;margin:10px;border-radius:8px;border:none;background:#1a1a1a;color:white;}
.card{background:#111;padding:10px;margin:10px;border-radius:10px;}
.star{font-size:50px;cursor:pointer;}
</style>
</head>

<body>

<h1>🗳️ MAVRIC TEST FIX</h1>

<button id="loginBtn">Login</button>
<button id="logoutBtn">Logout</button>
<div id="user">Not logged in</div>

<input id="ideaInput" placeholder="Idea"/>
<button id="postBtn">Post Idea</button>

<div id="ideas"></div>

<h2>🎮 Game</h2>
<button id="startBtn">Start</button>
<div class="star" id="star">⭐</div>
<div id="score">0</div>

<script>

/* CONFIRM SCRIPT RUNS */
alert("SCRIPT LOADED");

/* BUTTON REFERENCES */
const loginBtn = document.getElementById("loginBtn");
const logoutBtn = document.getElementById("logoutBtn");
const postBtn = document.getElementById("postBtn");
const startBtn = document.getElementById("startBtn");
const star = document.getElementById("star");

/* BASIC TEST HANDLERS */
loginBtn.onclick = () => alert("Login button works");
logoutBtn.onclick = () => alert("Logout button works");
postBtn.onclick = () => alert("Post button works");

/* GAME */
let running=false;
let score=0;

startBtn.onclick = () => {
  alert("Game started");
  running=true;
  score=0;
  document.getElementById("score").innerText=0;

  setTimeout(()=>{
    running=false;
    alert("Score: "+score);
  },5000);
};

star.onclick = () => {
  if(!running) return;
  score++;
  document.getElementById("score").innerText=score;
};

</script>

</body>
</html>
