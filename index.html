<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mavric Campaign V4</title>

<style>
/* =========================
   RESET
========================= */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family: Arial, Helvetica, sans-serif;
  color:white;
  background:#0a0a0a;
  overflow-x:hidden;
}

/* =========================
   HEADER
========================= */
header{
  position:sticky;
  top:0;
  z-index:100;

  background: rgba(20,20,20,0.9);
  backdrop-filter: blur(10px);

  padding:14px;
  text-align:center;

  font-weight:700;
  color:#a855f7;

  border-bottom:1px solid rgba(255,255,255,0.08);
}

/* =========================
   SECTIONS (IMPORTANT FIX)
========================= */
.section{
  padding:22px 16px;
  max-width:900px;
  margin:auto;

  text-align:center;
}

/* =========================
   INPUTS + BUTTONS
========================= */
input, button{
  width:100%;
  max-width:360px;
  padding:12px;

  margin:8px auto;
  display:block;

  border-radius:10px;
  border:1px solid rgba(255,255,255,0.1);

  background:#111;
  color:white;
}

button{
  background: linear-gradient(135deg, #a855f7, #6366f1);
  cursor:pointer;
  font-weight:600;
  transition:0.2s ease;
}

button:hover{
  transform: scale(1.03);
}

/* =========================
   TIMER (FIXED VISIBILITY)
========================= */
#timer{
  margin-top:10px;
  font-size:18px;
  color:#a855f7;
}

.voting-day{
  font-size:24px;
  font-weight:800;
  color:gold;
  text-shadow:0 0 10px gold;
}

/* =========================
   IDEAS (FIXED)
========================= */
.idea{
  background:#111;
  border:1px solid rgba(255,255,255,0.08);

  padding:12px;
  margin:10px auto;

  max-width:520px;
  border-radius:12px;

  text-align:left;
}

/* =========================
   FEED GRID (FIXED IMAGES)
========================= */
.feed{
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(140px, 1fr));
  gap:10px;
}

.photo{
  background:#111;
  border-radius:12px;
  overflow:hidden;
}

/* 🔥 FIX IMAGE STRETCHING */
.photo img{
  width:100%;
  height:160px;
  object-fit:cover;
  display:block;
}

.photo div{
  padding:8px;
  font-size:13px;
}

/* =========================
   SMALL ANIMATIONS (SAFE)
========================= */
.section{
  animation: fadeIn 0.6s ease;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(10px)}
  to{opacity:1; transform:translateY(0)}
}

/* =========================
   MOBILE
========================= */
@media (max-width:600px){
  .section{
    padding:18px 12px;
  }
}
</style>
<script>

const SUPABASE_URL = "https://didfhlfvdvurkfwbipli.supabase.co";
const SUPABASE_KEY = "sb_publishable_H6LVD2AlVaJ6SvHToXorgw_4ozq4FT0";
const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const UPLOAD_PASSWORD = "mavric123";

let userId = localStorage.getItem("userId");
if(!userId){
  userId = Math.random().toString(36).substring(2);
  localStorage.setItem("userId", userId);
}

/* COUNTDOWN */
const end = new Date("2026-04-24T00:00:00");

function updateTimer(){
  const diff = end - new Date();

  if(diff <= 0){
    document.getElementById("timer").innerHTML = "🗳️ VOTING DAY IS HERE!";
    return;
  }

  const d = Math.floor(diff/86400000);
  const h = Math.floor(diff/3600000)%24;
  const m = Math.floor(diff/60000)%60;

  document.getElementById("timer").innerHTML =
  `${d}d ${h}h ${m}m left`;
}

/* LOAD IDEAS */
async function loadIdeas(){
  const { data } = await client.from("ideas").select("*");
  if(!data) return;

  const sorted = [...data].sort((a,b)=>(b.votes||0)-(a.votes||0));

  document.getElementById("trending").innerHTML =
    sorted.slice(0,3).map(renderIdea).join("");

  document.getElementById("ideas").innerHTML =
    sorted.map(renderIdea).join("");
}

/* RENDER IDEA */
function renderIdea(i){
  return `
  <div class="idea ${i.votes > 5 ? "trending" : ""}">
    💡 ${i.text}<br><br>
    🗳️ ${i.votes || 0} votes

    <div class="voteBtn" onclick="vote('${i.id}')">
      👍 Vote
    </div>
  </div>
  `;
}

/* VOTE (1 per user per idea) */
async function vote(id){

  let voted = JSON.parse(localStorage.getItem("votes") || "{}");
  if(voted[id]) return alert("You already voted on this idea!");

  const { data } = await client.from("ideas").select("*").eq("id", id).single();

  await client.from("ideas")
    .update({ votes: (data.votes || 0) + 1 })
    .eq("id", id);

  voted[id] = true;
  localStorage.setItem("votes", JSON.stringify(voted));

  loadIdeas();
  confetti({particleCount:60, spread:70});
}

/* SUBMIT IDEA */
async function submitIdea(){
  const text = document.getElementById("ideaInput").value;
  if(!text) return;

  await client.from("ideas").insert({ text, votes:0 });

  document.getElementById("ideaInput").value = "";
  loadIdeas();

  confetti();
}

/* PHOTO UPLOAD */
async function uploadPhoto(){

  const pass = document.getElementById("uploadPass").value;
  if(pass !== UPLOAD_PASSWORD){
    alert("Wrong password!");
    return;
  }

  const files = fileInput.files;
  const caption = captionInput.value;

  if(!files.length) return;

  const limit = Math.min(files.length, 25);

  for(let i=0;i<limit;i++){
    const file = files[i];
    const name = Date.now()+"-"+file.name;

    const { error } = await client.storage
      .from("campaign")
      .upload(name, file);

    if(error){
      alert(error.message);
      return;
    }

    const url = client.storage
      .from("campaign")
      .getPublicUrl(name).data.publicUrl;

    await client.from("photos").insert({
      url,
      caption
    });
  }

  loadPhotos();
}

/* LOAD PHOTOS */
async function loadPhotos(){
  const { data } = await client.from("photos").select("*");
  if(!data) return;

  document.getElementById("feed").innerHTML =
    data.map(p=>`
      <div class="photo">
        <img src="${p.url}">
        <div>${p.caption || ""}</div>
      </div>
    `).join("");
}

/* INIT */
loadIdeas();
loadPhotos();
updateTimer();

setInterval(updateTimer,1000);
setInterval(loadIdeas,4000);
setInterval(loadPhotos,4000);

</script>

</body>
</html>
