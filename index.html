<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mavric Campaign - Election Night</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

/* =========================
   BASE
========================= */
body{
  margin:0;
  font-family:Arial;
  background:#0b0b0f;
  color:white;
  overflow-x:hidden;
}

/* =========================
   CINEMATIC BACKGROUND
========================= */
.bg{
  position:fixed;
  inset:0;
  z-index:-3;
  background:linear-gradient(120deg,#0b0b0f,#1a0b2e,#2a0b3d,#0b0b0f);
  background-size:300% 300%;
  animation:move 12s ease infinite;
}

@keyframes move{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

.glow{
  position:fixed;
  inset:0;
  z-index:-2;
  background:
    radial-gradient(circle at 30% 20%, rgba(168,85,247,0.25), transparent 40%),
    radial-gradient(circle at 70% 80%, rgba(255,215,0,0.07), transparent 40%);
}

canvas{
  position:fixed;
  inset:0;
  z-index:-1;
  pointer-events:none;
}

/* =========================
   HEADER
========================= */
header{
  padding:14px;
  text-align:center;
  background:#111;
  color:#a855f7;
  font-weight:bold;
  position:sticky;
  top:0;
}

/* =========================
   HERO
========================= */
.hero{
  text-align:center;
  padding:25px;
}

.slogan{
  color:#a855f7;
  font-weight:bold;
}

/* =========================
   SECTIONS
========================= */
.section{
  padding:20px;
  text-align:center;
}

/* =========================
   INPUTS
========================= */
input, button{
  width:90%;
  max-width:360px;
  padding:10px;
  margin:6px;
  border-radius:8px;
  border:none;
}

input{
  background:#1a1a1a;
  color:white;
  border:1px solid #333;
}

button{
  background:#a855f7;
  color:white;
  cursor:pointer;
}

/* =========================
   ELECTION BOARD
========================= */
.board{
  max-width:650px;
  margin:auto;
}

.card{
  background:#111;
  border:1px solid #333;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  text-align:left;
  transition:0.3s;
}

.leader{
  border:1px solid gold;
  box-shadow:0 0 15px rgba(255,215,0,0.3);
}

.bar{
  height:10px;
  background:#222;
  border-radius:10px;
  overflow:hidden;
  margin-top:6px;
}

.fill{
  height:100%;
  background:linear-gradient(90deg,#a855f7,gold);
  width:0%;
  transition:0.8s ease;
}

.rank{
  font-weight:bold;
  color:gold;
}

/* =========================
   FEED
========================= */
.feed{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
  gap:10px;
}

.feed img{
  width:100%;
  height:140px;
  object-fit:cover;
  border-radius:8px;
}

</style>
</head>

<body>

<div class="bg"></div>
<div class="glow"></div>
<canvas id="c"></canvas>

<header>🗳️ ELECTION NIGHT - MAVRIC CAMPAIGN</header>

<!-- HERO -->
<div class="hero">
  <h1>LIVE RESULTS</h1>
  <div class="slogan">Your Voice, My Actions.</div>
</div>

<!-- TIMER -->
<div class="section">
  <h2>Countdown</h2>
  <div id="timer"></div>
</div>

<!-- IDEAS -->
<div class="section">
  <h2>Live Election Board</h2>
  <input id="ideaInput" placeholder="Add idea"/>
  <button onclick="addIdea()">Post</button>

  <div id="ideas" class="board"></div>
</div>

<!-- UPLOAD -->
<div class="section">
  <h2>Supporter Photos</h2>
  <input type="file" id="files" multiple>
  <input id="caption" placeholder="Caption">
  <button onclick="upload()">Upload (max 25)</button>

  <div class="feed" id="feed"></div>
</div>

<script>

/* =========================
   SUPABASE
========================= */
const client = supabase.createClient(
  "https://didfhlfvdvurkfwbipli.supabase.co",
  "sb_publishable_H6LVD2AlVaJ6SvHToXorgw_4ozq4FT0"
);

/* =========================
   SETTINGS
========================= */
const UPLOAD_PASSWORD = "mavric123";

/* =========================
   TIMER
========================= */
const end = new Date("2026-04-24");

function timer(){
  const diff = end - new Date();
  const el = document.getElementById("timer");

  const d = Math.floor(diff/86400000);
  el.innerHTML = diff > 0 ? `${d} days left` : "VOTING DAY";
}

/* =========================
   VOTING (1 PER PERSON PER IDEA)
========================= */
function voted(id){
  return localStorage.getItem("v_"+id)==="1";
}

function mark(id){
  localStorage.setItem("v_"+id,"1");
}

async function vote(id,votes){

  if(voted(id)){
    alert("Already voted");
    return;
  }

  await client.from("ideas")
    .update({votes:votes+1})
    .eq("id",id);

  mark(id);
  loadIdeas();
}

/* =========================
   LIVE ELECTION BOARD
========================= */
async function loadIdeas(){

  const {data} = await client.from("ideas").select("*");
  if(!data) return;

  const sorted = data.sort((a,b)=>(b.votes||0)-(a.votes||0));
  const total = sorted.reduce((a,b)=>a+(b.votes||0),0) || 1;

  document.getElementById("ideas").innerHTML =
    sorted.map((i,index)=>{

      const percent = ((i.votes||0)/total*100).toFixed(1);

      return `
        <div class="card ${index===0?"leader":""}">
          
          <div>
            <span class="rank">#${index+1}</span>
            💡 ${i.text}
          </div>

          <div>🗳️ ${i.votes||0} (${percent}%)</div>

          <div class="bar">
            <div class="fill" style="width:${percent}%"></div>
          </div>

          <button onclick="vote('${i.id}',${i.votes||0})">
            Vote
          </button>

        </div>
      `;
    }).join("");
}

/* =========================
   ADD IDEA
========================= */
async function addIdea(){
  const text=document.getElementById("ideaInput").value;
  if(!text) return;

  await client.from("ideas").insert({text,votes:0});
  document.getElementById("ideaInput").value="";
  loadIdeas();
}

/* =========================
   UPLOAD (PASSWORD + 25)
========================= */
async function upload(){

  const pw = prompt("Upload password:");
  if(pw !== UPLOAD_PASSWORD){
    alert("Wrong password");
    return;
  }

  const files = document.getElementById("files").files;
  const caption = document.getElementById("caption").value;

  const limit = Math.min(files.length,25);

  for(let i=0;i<limit;i++){

    const file = files[i];
    const name = Date.now()+"-"+file.name;

    await client.storage.from("campaign").upload(name,file);

    const url = client.storage.from("campaign")
      .getPublicUrl(name).data.publicUrl;

    await client.from("photos").insert({
      url,
      caption
    });
  }

  loadPhotos();
}

/* =========================
   PHOTOS
========================= */
async function loadPhotos(){
  const {data} = await client.from("photos").select("*");
  if(!data) return;

  document.getElementById("feed").innerHTML =
    data.map(p=>`
      <img src="${p.url}">
    `).join("");
}

/* =========================
   PARTICLES
========================= */
const c=document.getElementById("c");
const x=c.getContext("2d");

c.width=innerWidth;
c.height=innerHeight;

let p=[];

for(let i=0;i<50;i++){
  p.push({
    x:Math.random()*c.width,
    y:Math.random()*c.height,
    r:Math.random()*2,
    dx:(Math.random()-0.5)*0.3,
    dy:(Math.random()-0.5)*0.3
  });
}

function animate(){
  x.clearRect(0,0,c.width,c.height);

  for(let i of p){
    x.beginPath();
    x.arc(i.x,i.y,i.r,0,Math.PI*2);
    x.fillStyle="rgba(168,85,247,0.4)";
    x.fill();

    i.x+=i.dx;
    i.y+=i.dy;

    if(i.x<0||i.x>c.width) i.dx*=-1;
    if(i.y<0||i.y>c.height) i.dy*=-1;
  }

  requestAnimationFrame(animate);
}

animate();

/* =========================
   INIT
========================= */
loadIdeas();
loadPhotos();
timer();

setInterval(timer,1000);

</script>

</body>
</html>
