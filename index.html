<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mavric Campaign</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

/* =========================
   GLOBAL (SAFE BASE)
========================= */
body{
  margin:0;
  font-family:Arial;
  color:white;
  background:#0b0b0f;
  overflow-x:hidden;
}

/* =========================
   BACKGROUND (SAFE)
========================= */
.bg{
  position:fixed;
  inset:0;
  z-index:-3;
  background:linear-gradient(120deg,#0b0b0f,#1a0b2e,#2a0b3d,#0b0b0f);
  background-size:300% 300%;
  animation:move 12s ease infinite;
}

@keyframes move{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

.glow{
  position:fixed;
  inset:0;
  z-index:-2;
  background:
    radial-gradient(circle at 30% 20%, rgba(168,85,247,0.25), transparent 40%),
    radial-gradient(circle at 70% 80%, rgba(255,215,0,0.07), transparent 40%);
}

/* canvas must NEVER block UI */
canvas{
  position:fixed;
  inset:0;
  z-index:-1;
  pointer-events:none;
}

/* =========================
   HEADER
========================= */
header{
  padding:14px;
  text-align:center;
  background:#111;
  color:#a855f7;
  font-weight:bold;
}

/* =========================
   SECTIONS
========================= */
.section{
  padding:20px;
  text-align:center;
}

/* =========================
   BUTTONS
========================= */
button{
  padding:10px;
  border:none;
  border-radius:8px;
  background:#a855f7;
  color:white;
  cursor:pointer;
}

input{
  padding:10px;
  width:90%;
  max-width:300px;
  margin:6px;
  border-radius:8px;
  border:none;
}

/* =========================
   IDEAS
========================= */
.idea{
  background:#111;
  margin:10px auto;
  padding:10px;
  border-radius:10px;
  max-width:500px;
  border:1px solid #333;
}

/* =========================
   PHOTO GRID
========================= */
.feed{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
  gap:10px;
}

.photo img{
  width:100%;
  height:140px;
  object-fit:cover;
  border-radius:8px;
}

/* =========================
   SAFE INTRO
========================= */
#intro{
  position:fixed;
  inset:0;
  background:#0b0b0f;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
  animation:fade 2s forwards;
}

@keyframes fade{
  0%{opacity:1}
  80%{opacity:1}
  100%{opacity:0; visibility:hidden}
}

</style>
</head>

<body>

<div class="bg"></div>
<div class="glow"></div>

<canvas id="c"></canvas>

<div id="intro">
  <div style="text-align:center">
    <h1 style="color:#a855f7">Mavric Campaign</h1>
    <p>Your Voice, My Actions.</p>
  </div>
</div>

<header>Mavric Campaign Page</header>

<div class="section">
  <h2>Countdown</h2>
  <div id="timer"></div>
</div>

<div class="section">
  <h2>Ideas</h2>
  <input id="ideaInput" placeholder="Idea"/>
  <button onclick="addIdea()">Post</button>
  <div id="ideas">Loading...</div>
</div>

<div class="section">
  <h2>Photos</h2>
  <input type="file" id="file">
  <input id="caption" placeholder="Caption">
  <button onclick="upload()">Upload</button>
  <div class="feed" id="feed"></div>
</div>

<script>

/* =========================
   SAFE SUPABASE INIT
========================= */
let client=null;

try{
  client = supabase.createClient(
    "https://didfhlfvdvurkfwbipli.supabase.co",
    "sb_publishable_H6LVD2AlVaJ6SvHToXorgw_4ozq4FT0"
  );
}catch(e){
  console.log("Supabase failed but site still works");
}

/* =========================
   TIMER
========================= */
const end=new Date("2026-04-24");

function timer(){
  const diff=end-new Date();
  const el=document.getElementById("timer");

  if(diff<=0){
    el.innerHTML="VOTING DAY";
    return;
  }

  const d=Math.floor(diff/86400000);
  el.innerHTML=d+" days left";
}

/* =========================
   IDEAS SAFE LOAD
========================= */
async function loadIdeas(){
  try{
    if(!client) return;

    const {data}=await client.from("ideas").select("*");
    if(!data) return;

    document.getElementById("ideas").innerHTML=
      data.map(i=>`
        <div class="idea">
          💡 ${i.text} <br>
          🗳️ ${i.votes||0}
        </div>
      `).join("");

  }catch(e){
    document.getElementById("ideas").innerHTML="Ideas offline";
  }
}

async function addIdea(){
  const text=document.getElementById("ideaInput").value;
  if(!text || !client) return;

  await client.from("ideas").insert({text,votes:0});
  document.getElementById("ideaInput").value="";
  loadIdeas();
}

/* =========================
   PHOTO SAFE
========================= */
async function upload(){
  try{
    if(!client) return;

    const file=document.getElementById("file").files[0];
    const caption=document.getElementById("caption").value;
    if(!file) return;

    const name=Date.now()+"-"+file.name;

    await client.storage.from("campaign").upload(name,file);

    const url=client.storage.from("campaign")
      .getPublicUrl(name).data.publicUrl;

    await client.from("photos").insert({url,caption});

    loadPhotos();

  }catch(e){
    alert("Upload failed");
  }
}

async function loadPhotos(){
  try{
    if(!client) return;

    const {data}=await client.from("photos").select("*");
    if(!data) return;

    document.getElementById("feed").innerHTML=
      data.map(p=>`
        <div class="photo">
          <img src="${p.url}">
        </div>
      `).join("");

  }catch(e){}
}

/* =========================
   PARTICLES SAFE (NO CRASH)
========================= */
const canvas=document.getElementById("c");
const ctx=canvas.getContext("2d");

function resize(){
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
}
resize();
window.addEventListener("resize",resize);

let particles=[];

for(let i=0;i<40;i++){
  particles.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    r:Math.random()*2,
    dx:(Math.random()-0.5)*0.3,
    dy:(Math.random()-0.5)*0.3
  });
}

function animate(){
  try{
    ctx.clearRect(0,0,canvas.width,canvas.height);

    for(let p of particles){
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle="rgba(168,85,247,0.4)";
      ctx.fill();

      p.x+=p.dx;
      p.y+=p.dy;

      if(p.x<0||p.x>canvas.width) p.dx*=-1;
      if(p.y<0||p.y>canvas.height) p.dy*=-1;
    }
  }catch(e){}

  requestAnimationFrame(animate);
}

animate();

/* =========================
   INIT SAFE ORDER
========================= */
timer();
loadIdeas();
loadPhotos();

setInterval(timer,1000);
setInterval(loadIdeas,4000);
setInterval(loadPhotos,5000);

setTimeout(()=>{
  const i=document.getElementById("intro");
  if(i) i.remove();
},2000);

</script>

</body>
</html>
