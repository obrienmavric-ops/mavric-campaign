<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CNN Election V8 + Auth</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#060713;
  color:white;
}

header{
  display:flex;
  justify-content:space-between;
  padding:10px;
  background:#111;
  border-bottom:2px solid #a855f7;
}

#live{
  color:red;
  animation:blink 1s infinite;
  font-weight:bold;
}
@keyframes blink{50%{opacity:0.3;}}

#ticker{
  background:#a855f7;
  color:black;
  padding:6px;
}

.container{
  display:grid;
  grid-template-columns:1fr 1.2fr;
  height:calc(100vh - 110px);
}

.panel{
  padding:10px;
  background:#0b0c18;
  overflow:auto;
  border-right:1px solid #222;
}

.screen{
  padding:15px;
}

input{
  padding:10px;
  width:70%;
  border-radius:8px;
  border:none;
  background:#1a1a1a;
  color:white;
}

button{
  padding:10px;
  margin:5px;
  background:#a855f7;
  border:none;
  border-radius:8px;
  color:white;
  cursor:pointer;
}

.card{
  background:#111;
  margin:10px 0;
  padding:10px;
  border-radius:10px;
  border:1px solid #222;
}

.leader{
  border:1px solid gold;
}

.trending{
  border:1px solid #00ff99 !important;
}

/* BAR */
.bar{
  height:10px;
  background:#222;
  border-radius:10px;
  overflow:hidden;
  margin-top:6px;
}

.fill{
  height:100%;
  background:linear-gradient(90deg,#a855f7,gold);
  transition:0.5s;
}
</style>
</head>

<body>

<header>
  <div>📺 CNN ELECTION LIVE</div>
  <div id="live">● LIVE</div>
  <div id="status">STARTING...</div>
</header>

<div id="ticker">Breaking: Election broadcast online</div>

<!-- AUTH PANEL -->
<div style="padding:10px; background:#0b0c18;">
  <button onclick="login()">🔐 Login with Google</button>
  <button onclick="logout()">Logout</button>
  <div id="user">Not logged in</div>
</div>

<div class="container">

  <!-- LEFT -->
  <div class="panel">

    <h3>🎛 Control Room</h3>

    <input id="ideaInput" placeholder="Enter idea"/>
    <button onclick="postIdea()">Post Idea</button>

    <button onclick="loadIdeas()">Refresh</button>

    <div id="ideas"></div>
  </div>

  <!-- RIGHT -->
  <div class="screen">

    <h2>📊 LIVE RESULTS</h2>

    <div id="topIdea">Loading...</div>
    <div id="graph"></div>

  </div>

</div>

<script>

let client = null;
let currentUser = null;
let lastVotes = {};

/* INIT */
window.onload = async () => {

  client = window.supabase.createClient(
    "https://didfhlfvdvurkfwbipli.supabase.co",
    "sb_publishable_H6LVD2AlVaJ6SvHToXorgw_4ozq4FT0"
  );

  const { data } = await client.auth.getUser();
  currentUser = data?.user || null;

  updateUser();
  document.getElementById("status").innerText = "LIVE";

  loadIdeas();

  client.channel('ideas-live')
    .on('postgres_changes',
      { event:'*', schema:'public', table:'ideas' },
      () => loadIdeas()
    )
    .subscribe();
};

/* AUTH */
async function login(){
  await client.auth.signInWithOAuth({
    provider:"google",
    options:{
      redirectTo: window.location.origin
    }
  });
}

async function logout(){
  await client.auth.signOut();
  currentUser = null;
  updateUser();
}

function updateUser(){
  document.getElementById("user").innerText =
    currentUser ? `Logged in: ${currentUser.email}` : "Not logged in";
}

/* POST IDEA (LOCKED) */
async function postIdea(){

  if(!currentUser){
    alert("Login required");
    return;
  }

  const text = document.getElementById("ideaInput").value;
  if(!text) return;

  await client.from("ideas").insert({
    text,
    votes:0,
    created_by: currentUser.id
  });

  document.getElementById("ideaInput").value="";
  loadIdeas();
}

/* VOTE (LOCKED + ONE PER USER) */
async function vote(id){

  if(!currentUser){
    alert("Login required");
    return;
  }

  const { data: existing } = await client
    .from("votes")
    .select("*")
    .eq("user_id", currentUser.id)
    .eq("idea_id", id)
    .single();

  if(existing){
    alert("Already voted on this idea");
    return;
  }

  await client.from("votes").insert({
    user_id: currentUser.id,
    idea_id: id
  });

  const { data } = await client
    .from("ideas")
    .select("votes")
    .eq("id", id)
    .single();

  await client
    .from("ideas")
    .update({ votes:(data?.votes||0)+1 })
    .eq("id", id);

  loadIdeas();
}

/* LOAD */
async function loadIdeas(){

  const ideasEl = document.getElementById("ideas");
  const topEl = document.getElementById("topIdea");
  const graphEl = document.getElementById("graph");

  const { data } = await client.from("ideas").select("*");
  if(!data) return;

  const sorted = data.sort((a,b)=>(b.votes||0)-(a.votes||0));
  const total = sorted.reduce((a,b)=>a+(b.votes||0),0)||1;

  ideasEl.innerHTML = sorted.map(i=>{

    const percent = ((i.votes||0)/total*100).toFixed(1);

    const prev = lastVotes[i.id] || 0;
    const spike = (i.votes||0)-prev;

    const trending = spike >= 2;

    lastVotes[i.id] = i.votes || 0;

    return `
      <div class="card ${trending?"trending":""} ${sorted[0]?.id===i.id?"leader":""}">
        💡 ${i.text}
        <div>🗳️ ${i.votes||0}</div>

        <button onclick="vote('${i.id}')">Vote</button>

        <div class="bar">
          <div class="fill" style="width:${percent}%"></div>
        </div>
      </div>
    `;
  }).join("");

  topEl.innerHTML =
    "🏆 Leader: <b>" + (sorted[0]?.text || "None") + "</b>";

  graphEl.innerHTML = sorted.slice(0,5).map(i=>{
    const h = ((i.votes||0)/total)*100;
    return `<div style="height:${h}%; width:20%; background:#a855f7;"></div>`;
  }).join("");
}

</script>

</body>
</html>
