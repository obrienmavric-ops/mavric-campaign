<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mavric Election V7 SAFE</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0b12;
  color:white;
  text-align:center;
}

#status{
  padding:10px;
  background:#111;
  color:#a855f7;
}

button{
  padding:10px;
  margin:6px;
  background:#a855f7;
  border:none;
  border-radius:8px;
  color:white;
  cursor:pointer;
}

input{
  padding:10px;
  margin:6px;
  border-radius:8px;
  border:none;
  background:#1a1a1a;
  color:white;
}

.card{
  background:#111;
  margin:10px auto;
  padding:10px;
  border-radius:10px;
  max-width:500px;
}

.star{
  font-size:50px;
  cursor:pointer;
}
</style>
</head>

<body>

<div id="status">JS Running...</div>

<h1>🗳️ MAVRIC PLATFORM</h1>

<button id="loginBtn">Login</button>
<button id="logoutBtn">Logout</button>

<div id="user">Not logged in</div>

<h3>💡 Ideas</h3>

<input id="ideaInput" placeholder="Idea"/>
<button id="postBtn">Post</button>

<div id="ideas"></div>

<h3>🎮 Game</h3>

<button id="startBtn">Start</button>
<div class="star" id="star">⭐</div>
<div id="score">0</div>

<script>

/* =========================
   FORCE PROOF SCRIPT RUNNING
========================= */
console.log("SCRIPT ACTIVE");
document.getElementById("status").innerText = "Script Active";

/* =========================
   SAFE STATE
========================= */
let supabase = null;
let user = null;
let running = false;
let score = 0;

/* =========================
   UI (ALWAYS WORKS)
========================= */
document.getElementById("loginBtn").onclick = () => {
  alert("Login clicked");

  if(!supabase){
    alert("Backend not ready (Supabase not loaded)");
    return;
  }

  supabase.auth.signInWithOAuth({provider:"google"});
};

document.getElementById("logoutBtn").onclick = () => {
  alert("Logout clicked");
  if(supabase) supabase.auth.signOut();
};

document.getElementById("postBtn").onclick = async () => {
  alert("Post clicked");

  if(!supabase) return alert("Backend not ready");

  const text = document.getElementById("ideaInput").value;
  if(!text) return;

  await supabase.from("ideas").insert({text, votes:0});
  loadIdeas();
};

/* GAME ALWAYS WORKS */
document.getElementById("startBtn").onclick = () => {
  alert("Game started");

  running = true;
  score = 0;
  document.getElementById("score").innerText = 0;

  setTimeout(()=>{
    running = false;
    alert("Score: " + score);
  }, 6000);
};

document.getElementById("star").onclick = () => {
  if(!running) return;
  score++;
  document.getElementById("score").innerText = score;
};

/* =========================
   SUPABASE (NON-BLOCKING)
========================= */
function initSupabase(){
  try{
    if(!window.supabase){
      document.getElementById("status").innerText =
        "Supabase not loaded (UI still works)";
      return;
    }

    supabase = window.supabase.createClient(
      "PASTE_SUPABASE_URL",
      "PASTE_SUPABASE_ANON_KEY"
    );

    document.getElementById("status").innerText =
      "Backend Connected";

    loadIdeas();

  }catch(e){
    console.error(e);
    document.getElementById("status").innerText =
      "Supabase error (UI still works)";
  }
}

/* run immediately, no delay tricks */
initSupabase();

/* =========================
   IDEAS
========================= */
async function loadIdeas(){
  if(!supabase) return;

  const {data} = await supabase.from("ideas").select("*");
  if(!data) return;

  document.getElementById("ideas").innerHTML =
    data.map(i=>`
      <div class="card">
        💡 ${i.text}
        <div>🗳️ ${i.votes||0}</div>
        <button onclick="vote('${i.id}')">Vote</button>
      </div>
    `).join("");
}

async function vote(id){
  if(!supabase) return;

  const {data} = await supabase.from("ideas")
    .select("votes")
    .eq("id",id)
    .single();

  await supabase.from("ideas")
    .update({votes:(data.votes||0)+1})
    .eq("id",id);

  loadIdeas();
}

</script>

</body>
</html>
