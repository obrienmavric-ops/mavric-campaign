<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mavric Campaign</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

/* =========================
   GLOBAL
========================= */
body{
  margin:0;
  font-family:Arial;
  background:#0b0b0f;
  color:white;
  overflow-x:hidden;
}

/* =========================
   CINEMATIC BACKGROUND
========================= */
.bg{
  position:fixed;
  inset:0;
  z-index:-3;
  background:linear-gradient(120deg,#0b0b0f,#1a0b2e,#2a0b3d,#0b0b0f);
  background-size:300% 300%;
  animation:move 14s ease infinite;
}

@keyframes move{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

.glow{
  position:fixed;
  inset:0;
  z-index:-2;
  background:
    radial-gradient(circle at 30% 20%, rgba(168,85,247,0.25), transparent 40%),
    radial-gradient(circle at 70% 80%, rgba(255,215,0,0.07), transparent 40%);
}

canvas{
  position:fixed;
  inset:0;
  z-index:-1;
  pointer-events:none;
}

/* =========================
   INTRO
========================= */
#intro{
  position:fixed;
  inset:0;
  background:#0b0b0f;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
  animation:fade 2.3s ease forwards;
}

@keyframes fade{
  0%{opacity:1}
  80%{opacity:1}
  100%{opacity:0;visibility:hidden}
}

/* =========================
   HEADER
========================= */
header{
  padding:14px;
  text-align:center;
  background:#111;
  color:#a855f7;
  font-weight:bold;
}

/* =========================
   HERO
========================= */
.hero{
  text-align:center;
  padding:30px;
}

.slogan{
  color:#a855f7;
  font-weight:bold;
  margin-top:6px;
}

/* =========================
   SECTIONS
========================= */
.section{
  padding:20px;
  text-align:center;
}

/* =========================
   INPUTS
========================= */
input, button{
  width:90%;
  max-width:360px;
  padding:10px;
  margin:6px;
  border-radius:8px;
  border:none;
}

input{
  background:#1a1a1a;
  color:white;
  border:1px solid #333;
}

button{
  background:#a855f7;
  color:white;
  cursor:pointer;
}

/* =========================
   IDEAS
========================= */
.idea{
  background:#111;
  border:1px solid #333;
  margin:10px auto;
  padding:10px;
  border-radius:10px;
  max-width:520px;
  text-align:left;
}

.trending{
  background:gold;
  color:black;
  font-size:12px;
  padding:3px 6px;
  border-radius:6px;
  display:inline-block;
  margin-bottom:6px;
}

/* =========================
   FEED
========================= */
.feed{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
  gap:10px;
}

.photo img{
  width:100%;
  height:140px;
  object-fit:cover;
  border-radius:8px;
}

</style>
</head>

<body>

<div class="bg"></div>
<div class="glow"></div>
<canvas id="c"></canvas>

<!-- INTRO -->
<div id="intro">
  <div style="text-align:center">
    <h1 style="color:#a855f7">Mavric Campaign</h1>
    <p>Your Voice, My Actions.</p>
  </div>
</div>

<header>Mavric Campaign Page</header>

<!-- HERO -->
<div class="hero">
  <h1>Leadership That Listens</h1>
  <div class="slogan">Your Voice, My Actions.</div>
  <p>
    My mission is to turn student ideas into real action.
    Not promises — results. Every student deserves a voice that matters.
  </p>
</div>

<!-- TIMER -->
<div class="section">
  <h2>Countdown</h2>
  <div id="timer"></div>
</div>

<!-- IDEAS -->
<div class="section">
  <h2>Trending Ideas</h2>
  <input id="ideaInput" placeholder="Submit idea"/>
  <button onclick="addIdea()">Post</button>
  <div id="ideas"></div>
</div>

<!-- UPLOAD -->
<div class="section">
  <h2>Upload Photos</h2>
  <input type="file" id="files" multiple>
  <input id="caption" placeholder="Caption">
  <button onclick="upload()">Upload (max 25)</button>
  <div class="feed" id="feed"></div>
</div>

<script>

/* =========================
   SUPABASE
========================= */
const client = supabase.createClient(
  "https://didfhlfvdvurkfwbipli.supabase.co",
  "sb_publishable_H6LVD2AlVaJ6SvHToXorgw_4ozq4FT0"
);

/* =========================
   SETTINGS
========================= */
const UPLOAD_PASSWORD = "mavric123";

/* =========================
   TIMER
========================= */
const end = new Date("2026-04-24");

function timer(){
  const diff = end - new Date();
  const el = document.getElementById("timer");

  const d = Math.floor(diff/86400000);

  el.innerHTML = diff > 0 ? d + " days left" : "VOTING DAY";
}

/* =========================
   IDEAS
========================= */
async function loadIdeas(){
  const {data} = await client.from("ideas").select("*");
  if(!data) return;

  const sorted = data.sort((a,b)=>(b.votes||0)-(a.votes||0));

  document.getElementById("ideas").innerHTML =
    sorted.map((i,index)=>`
      <div class="idea">
        ${index===0 ? `<div class="trending">🔥 #1 Trending</div>` : ""}
        💡 ${i.text}<br>
        🗳️ ${i.votes||0}
        <button onclick="vote('${i.id}',${i.votes||0})">
          Vote
        </button>
      </div>
    `).join("");
}

async function addIdea(){
  const text = document.getElementById("ideaInput").value;
  if(!text) return;

  await client.from("ideas").insert({text,votes:0});
  document.getElementById("ideaInput").value="";
  loadIdeas();
}

/* =========================
   VOTING (1 per person)
========================= */
function voted(id){
  return localStorage.getItem("v_"+id)==="1";
}

function mark(id){
  localStorage.setItem("v_"+id,"1");
}

async function vote(id,votes){

  if(voted(id)){
    alert("Already voted");
    return;
  }

  await client.from("ideas")
    .update({votes:votes+1})
    .eq("id",id);

  mark(id);
  loadIdeas();
}

/* =========================
   PHOTO UPLOAD (25 + PASSWORD)
========================= */
async function upload(){

  const pw = prompt("Upload password:");
  if(pw !== UPLOAD_PASSWORD){
    alert("Wrong password");
    return;
  }

  const files = document.getElementById("files").files;
  const caption = document.getElementById("caption").value;

  if(!files.length) return;

  const limit = Math.min(files.length,25);

  for(let i=0;i<limit;i++){

    const file = files[i];
    const name = Date.now()+"-"+file.name;

    await client.storage.from("campaign").upload(name,file);

    const url = client.storage.from("campaign")
      .getPublicUrl(name).data.publicUrl;

    await client.from("photos").insert({
      url,
      caption
    });
  }

  loadPhotos();
}

/* =========================
   PHOTOS
========================= */
async function loadPhotos(){
  const {data} = await client.from("photos").select("*");
  if(!data) return;

  document.getElementById("feed").innerHTML =
    data.map(p=>`
      <div class="photo">
        <img src="${p.url}">
      </div>
    `).join("");
}

/* =========================
   PARTICLES (SAFE)
========================= */
const c=document.getElementById("c");
const x=c.getContext("2d");

c.width=innerWidth;
c.height=innerHeight;

let p=[];

for(let i=0;i<50;i++){
  p.push({
    x:Math.random()*c.width,
    y:Math.random()*c.height,
    r:Math.random()*2,
    dx:(Math.random()-0.5)*0.3,
    dy:(Math.random()-0.5)*0.3
  });
}

function animate(){
  x.clearRect(0,0,c.width,c.height);

  for(let i of p){
    x.beginPath();
    x.arc(i.x,i.y,i.r,0,Math.PI*2);
    x.fillStyle="rgba(168,85,247,0.4)";
    x.fill();

    i.x+=i.dx;
    i.y+=i.dy;

    if(i.x<0||i.x>c.width) i.dx*=-1;
    if(i.y<0||i.y>c.height) i.dy*=-1;
  }

  requestAnimationFrame(animate);
}

animate();

/* =========================
   INIT
========================= */
loadIdeas();
loadPhotos();
timer();

setInterval(timer,1000);

setTimeout(()=>{
  document.getElementById("intro")?.remove();
},2200);

</script>

</body>
</html>
