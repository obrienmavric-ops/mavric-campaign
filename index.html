<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Election Platform V2</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#07070c;
  color:white;
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  padding:12px;
  background:#111;
  border-bottom:1px solid #333;
  position:sticky;
  top:0;
}

.live{
  color:red;
  font-weight:bold;
  animation:blink 1s infinite;
}
@keyframes blink{50%{opacity:0.3}}

/* TICKER */
.ticker{
  white-space:nowrap;
  overflow:hidden;
  background:#1a0b2e;
  border-bottom:1px solid #333;
}
.ticker span{
  display:inline-block;
  padding:10px;
  animation:scroll 14s linear infinite;
}
@keyframes scroll{
  from{transform:translateX(100%)}
  to{transform:translateX(-100%)}
}

/* LAYOUT */
.container{
  max-width:800px;
  margin:auto;
  padding:10px;
}

/* INPUT */
input{
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:8px;
  border:none;
  background:#1a1a1a;
  color:white;
}

button{
  background:#a855f7;
  border:none;
  padding:10px;
  border-radius:8px;
  color:white;
  cursor:pointer;
  margin:5px 0;
}

/* CARDS */
.card{
  background:#111;
  border:1px solid #333;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  transition:0.2s;
}
.card:hover{transform:scale(1.01)}

.leader{
  border:2px solid gold;
  box-shadow:0 0 20px rgba(255,215,0,0.3);
}

/* BAR */
.bar{
  height:10px;
  background:#222;
  border-radius:10px;
  overflow:hidden;
}
.fill{
  height:100%;
  background:linear-gradient(90deg,#a855f7,gold);
  transition:0.5s;
}

/* PHOTO GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
  gap:10px;
}

.photo{
  width:100%;
  aspect-ratio:1/1;
  object-fit:cover;
  border-radius:10px;
}

/* GAME */
.game{
  text-align:center;
  padding:20px;
}
.star{
  font-size:50px;
  cursor:pointer;
}
</style>
</head>

<body>

<header>
  <div>🗳️ ELECTION V2</div>
  <div class="live">🔴 LIVE</div>
</header>

<div class="ticker">
  <span id="ticker">Loading trending ideas...</span>
</div>

<div class="container">

<!-- AUTH -->
<button onclick="login()">Login with Google</button>
<button onclick="logout()">Logout</button>
<div id="user"></div>

<!-- IDEA INPUT -->
<h3>💡 Add Idea</h3>
<input id="ideaInput" placeholder="Your idea..."/>
<button onclick="addIdea()">Post Idea</button>

<!-- IDEAS -->
<div id="ideas"></div>

<!-- PHOTO UPLOAD -->
<h3>📸 Photos</h3>
<input type="file" id="files" multiple/>
<input id="caption" placeholder="Caption"/>
<button onclick="upload()">Upload</button>

<!-- PHOTO GRID -->
<div class="grid" id="photos"></div>

<!-- GAME -->
<div class="game">
  <h3>🎮 Click Rush</h3>
  <button onclick="startGame()">Start</button>
  <div class="star" onclick="hit()">⭐</div>
  <div id="score">0</div>
</div>

</div>

<script>

/* =====================
   SUPABASE
===================== */
const supabase = window.supabase.createClient(
  "PASTE_SUPABASE_URL",
  "PASTE_SUPABASE_ANON_KEY"
);

/* =====================
   AUTH
===================== */
let user=null;

async function login(){
  await supabase.auth.signInWithOAuth({provider:"google"});
}

async function logout(){
  await supabase.auth.signOut();
}

supabase.auth.onAuthStateChange((_,session)=>{
  user=session?.user||null;
  document.getElementById("user").innerText =
    user ? "Logged in: "+user.email : "Not logged in";
});

/* =====================
   IDEAS
===================== */
async function addIdea(){
  if(!user) return alert("Login required");

  const text=document.getElementById("ideaInput").value;
  if(!text) return;

  await supabase.from("ideas").insert({
    text,
    votes:0,
    user_email:user.email
  });

  document.getElementById("ideaInput").value="";
}

async function vote(id){
  if(!user) return alert("Login required");

  const {data}=await supabase.from("ideas")
    .select("votes")
    .eq("id",id)
    .single();

  await supabase.from("ideas")
    .update({votes:(data.votes||0)+1})
    .eq("id",id);

  loadIdeas();
}

async function loadIdeas(){
  const {data}=await supabase.from("ideas").select("*");
  if(!data) return;

  const sorted=data.sort((a,b)=>(b.votes||0)-(a.votes||0));
  const total=Math.max(sorted.reduce((a,b)=>a+(b.votes||0),0),1);

  document.getElementById("ideas").innerHTML=
    sorted.map((i,index)=>{
      const percent=((i.votes||0)/total*100).toFixed(1);

      return `
      <div class="card ${index===0?"leader":""}">
        <b>${index===0?"👑 LEADER":"#"+(index+1)}</b>
        <div>${i.text}</div>
        <div>🗳️ ${i.votes||0}</div>

        <div class="bar">
          <div class="fill" style="width:${percent}%"></div>
        </div>

        <button onclick="vote('${i.id}')">Vote</button>
      </div>`;
    }).join("");

  document.getElementById("ticker").innerText =
    sorted.slice(0,5).map(i=>"🔥 "+i.text).join(" • ");
}

/* =====================
   PHOTOS
===================== */
async function upload(){
  if(!user) return alert("Login required");

  const files=document.getElementById("files").files;
  const caption=document.getElementById("caption").value;

  for(let i=0;i<Math.min(files.length,25);i++){
    const file=files[i];
    const name=Date.now()+"-"+file.name;

    await supabase.storage.from("campaign").upload(name,file);

    const url=supabase.storage.from("campaign")
      .getPublicUrl(name).data.publicUrl;

    await supabase.from("photos").insert({
      url,
      caption,
      user_email:user.email
    });
  }

  loadPhotos();
}

async function loadPhotos(){
  const {data}=await supabase.from("photos").select("*");
  if(!data) return;

  document.getElementById("photos").innerHTML=
    data.map(p=>`
      <img class="photo" src="${p.url}"/>
    `).join("");
}

/* =====================
   GAME
===================== */
let score=0;
let running=false;

function startGame(){
  score=0;
  running=true;
  document.getElementById("score").innerText=0;

  setTimeout(()=>{
    running=false;
    alert("Score: "+score);
  },10000);
}

function hit(){
  if(!running) return;
  score++;
  document.getElementById("score").innerText=score;
}

/* =====================
   REALTIME (OPTIONAL BUT POWERFUL)
===================== */
supabase.channel('ideas')
  .on('postgres_changes',{event:'*',schema:'public',table:'ideas'},loadIdeas)
  .subscribe();

supabase.channel('photos')
  .on('postgres_changes',{event:'*',schema:'public',table:'photos'},loadPhotos)
  .subscribe();

/* INIT */
loadIdeas();
loadPhotos();
setInterval(loadIdeas,4000);

</script>

</body>
</html>
