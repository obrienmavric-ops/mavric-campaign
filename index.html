<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Mavric Campaign</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

/* =========================
   BASE + BACKGROUND
========================= */
body{
  margin:0;
  font-family:Arial;
  background:#0b0b0f;
  color:white;
}

.bg{
  position:fixed;
  inset:0;
  z-index:-3;
  background:linear-gradient(120deg,#0b0b0f,#1a0b2e,#2a0b3d,#0b0b0f);
  background-size:300% 300%;
  animation:move 12s infinite;
}

@keyframes move{
  0%{background-position:0%}
  50%{background-position:100%}
  100%{background-position:0%}
}

/* =========================
   UI
========================= */
.section{
  padding:20px;
  text-align:center;
}

input, button{
  padding:10px;
  margin:5px;
  border-radius:8px;
  border:none;
}

button{
  background:#a855f7;
  color:white;
}

/* =========================
   LEADERBOARD BOARD
========================= */
.card{
  background:#111;
  border:1px solid #333;
  padding:10px;
  margin:10px auto;
  max-width:600px;
  border-radius:10px;
  text-align:left;
}

.bar{
  height:10px;
  background:#222;
  border-radius:10px;
}

.fill{
  height:100%;
  background:linear-gradient(90deg,#a855f7,gold);
}

/* =========================
   GAME
========================= */
canvas{
  background:#111;
  border:2px solid #a855f7;
  border-radius:10px;
}

</style>
</head>

<body>

<div class="bg"></div>

<!-- LOGIN -->
<div class="section">
  <button onclick="login()">Sign in with Google</button>
  <button onclick="logout()">Logout</button>
  <div id="user"></div>
</div>

<!-- HERO -->
<div class="section">
  <h1>Mavric Campaign</h1>
  <p>Your Voice, My Actions.</p>
</div>

<!-- IDEAS -->
<div class="section">
  <h2>Ideas</h2>
  <input id="ideaInput" placeholder="Your idea"/>
  <button onclick="addIdea()">Post Idea</button>
  <div id="ideas"></div>
</div>

<!-- GAME -->
<div class="section">
  <h2>🎮 Vote Game</h2>
  <button onclick="startGame()">Start</button>
  <h3 id="score">Score: 0</h3>
  <canvas id="gameCanvas" width="320" height="400"></canvas>

  <h3>🏆 Leaderboard</h3>
  <div id="leaderboard"></div>
</div>

<script>

/* =========================
   SUPABASE
========================= */
const client = supabase.createClient(
  "https://didfhlfvdvurkfwbipli.supabase.co",
  "sb_publishable_H6LVD2AlVaJ6SvHToXorgw_4ozq4FT0"
);

let currentUser = null;

/* =========================
   AUTH
========================= */
async function login(){
  await client.auth.signInWithOAuth({ provider: 'google' });
}

async function logout(){
  await client.auth.signOut();
  location.reload();
}

async function getUser(){
  const { data } = await client.auth.getUser();
  currentUser = data.user;

  document.getElementById("user").innerText =
    currentUser ? "Signed in as: "+currentUser.email : "Not signed in";
}

getUser();

/* =========================
   IDEAS
========================= */
async function addIdea(){
  if(!currentUser){
    alert("Login first");
    return;
  }

  const text = document.getElementById("ideaInput").value;

  await client.from("ideas").insert({
    text,
    user: currentUser.email,
    votes:0
  });

  loadIdeas();
}

async function loadIdeas(){

  const {data} = await client.from("ideas").select("*");

  const total = data.reduce((a,b)=>a+(b.votes||0),0)||1;

  document.getElementById("ideas").innerHTML =
    data.map(i=>{

      const percent = ((i.votes||0)/total*100).toFixed(1);

      return `
        <div class="card">
          💡 ${i.text}<br>
          👤 ${i.user}<br>
          🗳️ ${i.votes}
          <div class="bar">
            <div class="fill" style="width:${percent}%"></div>
          </div>
          <button onclick="vote('${i.id}',${i.votes})">Vote</button>
        </div>
      `;
    }).join("");
}

/* =========================
   VOTING (REAL)
========================= */
async function vote(id,votes){

  if(!currentUser){
    alert("Login to vote");
    return;
  }

  const {data:existing} = await client
    .from("votes")
    .select("*")
    .eq("user_id", currentUser.id)
    .eq("idea_id", id);

  if(existing.length){
    alert("Already voted");
    return;
  }

  await client.from("votes").insert({
    user_id: currentUser.id,
    idea_id: id
  });

  await client.from("ideas")
    .update({votes:votes+1})
    .eq("id",id);

  loadIdeas();
}

/* =========================
   GAME (uses user name)
========================= */
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

let items=[], score=0, running=false;

function startGame(){
  items=[];
  score=0;
  running=true;
  loop();
  spawn();
}

function spawn(){
  if(!running) return;
  items.push({x:Math.random()*300,y:0});
  setTimeout(spawn,700);
}

canvas.onclick=e=>{
  if(!running) return;
  score++;
  document.getElementById("score").innerText="Score:"+score;
};

function loop(){
  if(!running) return;

  ctx.clearRect(0,0,320,400);

  items.forEach(i=>{
    i.y+=2;
    ctx.fillText("🗳️",i.x,i.y);

    if(i.y>400){
      running=false;
      endGame();
    }
  });

  requestAnimationFrame(loop);
}

async function endGame(){

  if(!currentUser){
    alert("Login to save score");
    return;
  }

  await client.from("scores").insert({
    name: currentUser.email,
    score
  });

  loadLeaderboard();
}

/* =========================
   LEADERBOARD
========================= */
async function loadLeaderboard(){
  const {data} = await client
    .from("scores")
    .select("*")
    .order("score",{ascending:false})
    .limit(5);

  document.getElementById("leaderboard").innerHTML =
    data.map((p,i)=>`
      <div>#${i+1} ${p.name} — ${p.score}</div>
    `).join("");
}

/* =========================
   INIT
========================= */
loadIdeas();
loadLeaderboard();

</script>

</body>
</html>
