<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Election Night Broadcast</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#05050a;
  color:white;
  overflow-x:hidden;
}

/* 📺 BROADCAST HEADER */
header{
  background:#111;
  padding:12px;
  font-weight:bold;
  color:#a855f7;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* LIVE TICKER */
#ticker{
  background:#a855f7;
  color:black;
  padding:6px;
  white-space:nowrap;
  overflow:hidden;
}

/* LAYOUT */
.container{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  padding:10px;
}

.panel{
  background:#111;
  border-radius:10px;
  padding:10px;
}

/* INPUTS */
input{
  padding:10px;
  width:80%;
  border-radius:8px;
  border:none;
  background:#1a1a1a;
  color:white;
}

button{
  padding:10px;
  margin:6px;
  background:#a855f7;
  border:none;
  border-radius:8px;
  color:white;
  cursor:pointer;
}

/* IDEAS */
.card{
  background:#0c0c14;
  padding:10px;
  margin:8px 0;
  border-radius:8px;
  border:1px solid #222;
}

.leader{
  border:1px solid gold;
  box-shadow:0 0 10px rgba(255,215,0,0.3);
}

/* TRENDING HIGHLIGHT */
.trending{
  border:1px solid #00ff99 !important;
  box-shadow:0 0 12px rgba(0,255,150,0.4);
}

/* BAR */
.bar{
  height:8px;
  background:#222;
  border-radius:10px;
  overflow:hidden;
  margin-top:5px;
}

.fill{
  height:100%;
  background:linear-gradient(90deg,#a855f7,gold);
  width:0%;
  transition:0.4s;
}
</style>
</head>

<body>

<header>
  <div>📺 ELECTION NIGHT LIVE</div>
  <div id="status">Connecting...</div>
</header>

<div id="ticker">Breaking: Live student election results updating in real time...</div>

<div class="container">

  <!-- LEFT -->
  <div class="panel">
    <h3>💡 Ideas</h3>

    <input id="ideaInput" placeholder="Enter idea"/>
    <button onclick="postIdea()">Post</button>

    <div id="ideas"></div>
  </div>

  <!-- RIGHT -->
  <div class="panel">
    <h3>📊 Broadcast Control</h3>

    <button onclick="manualRefresh()">Refresh Feed</button>
    <button onclick="simulateTicker()">Update Ticker</button>

    <p id="user">Not logged in</p>
  </div>

</div>

<script>

let client=null;
let user=null;
let lastVotes={};

/* INIT */
window.onload=()=>{

  client = window.supabase.createClient(
    "https://didfhlfvdvurkfwbipli.supabase.co",
    "sb_publishable_H6LVD2AlVaJ6SvHToXorgw_4ozq4FT0"
  );

  status.innerText="LIVE";

  client.auth.onAuthStateChange((_,session)=>{
    user=session?.user||null;
    userDiv.innerText=user?user.email:"Not logged in";
  });

  loadIdeas();

  /* ⚡ LIVE REAL-TIME */
  client
    .channel('ideas-live')
    .on('postgres_changes',
      { event:'*', schema:'public', table:'ideas' },
      payload=>{
        loadIdeas();
      }
    )
    .subscribe();
};

/* POST IDEA */
async function postIdea(){

  if(!client) return;

  const text=ideaInput.value;
  if(!text) return;

  await client.from("ideas").insert({text,votes:0});
  ideaInput.value="";
}

/* LOAD + TRENDING LOGIC */
async function loadIdeas(){

  const {data}=await client.from("ideas").select("*");
  if(!data) return;

  const sorted=data.sort((a,b)=>(b.votes||0)-(a.votes||0));
  const total=sorted.reduce((a,b)=>a+(b.votes||0),0)||1;

  ideas.innerHTML=sorted.map((i,index)=>{

    const percent=((i.votes||0)/total*100).toFixed(1);

    /* 🔥 TRENDING DETECTION */
    const previous=lastVotes[i.id]||0;
    const spike=(i.votes||0)-previous;

    const isTrending=spike>=2;

    lastVotes[i.id]=i.votes||0;

    return `
      <div class="card
        ${index===0?"leader":""}
        ${isTrending?"trending":""}
      ">

        <b>#${index+1}</b> 💡 ${i.text}

        <div>🗳️ ${i.votes||0} (${percent}%)</div>

        <div class="bar">
          <div class="fill" style="width:${percent}%"></div>
        </div>

      </div>
    `;
  }).join("");
}

/* BROADCAST FEATURES */
function manualRefresh(){
  loadIdeas();
}

function simulateTicker(){
  const messages=[
    "Breaking: Voting surge detected!",
    "Live update: Leader expanding lead!",
    "Alert: New idea trending!",
    "Broadcast: Student engagement rising!"
  ];

  ticker.innerText=messages[Math.floor(Math.random()*messages.length)];
}

</script>

</body>
</html>
