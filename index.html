<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CNN Election V10 DEBUG</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#070812;
  color:white;
}

header{
  padding:10px;
  background:#111;
  border-bottom:2px solid #a855f7;
  display:flex;
  justify-content:space-between;
}

#live{color:red;font-weight:bold;}

.container{
  display:grid;
  grid-template-columns:1fr 1fr;
  height:calc(100vh - 120px);
}

.panel{
  padding:10px;
  background:#0b0c18;
  overflow:auto;
  border-right:1px solid #222;
}

.screen{
  padding:10px;
}

input{
  width:70%;
  padding:10px;
  border-radius:8px;
  border:none;
  background:#1a1a1a;
  color:white;
}

button{
  padding:10px;
  margin:5px;
  background:#a855f7;
  border:none;
  border-radius:8px;
  color:white;
  cursor:pointer;
}

.card{
  background:#111;
  padding:10px;
  margin:10px 0;
  border-radius:10px;
  border:1px solid #222;
}

img{
  width:100%;
  height:140px;
  object-fit:cover;
  border-radius:8px;
}

.debug{
  background:#000;
  color:#00ff99;
  padding:10px;
  font-size:12px;
  height:120px;
  overflow:auto;
  border-top:1px solid #333;
}
</style>
</head>

<body>

<header>
  <div>📺 CNN ELECTION DEBUG V10</div>
  <div id="live">● LIVE</div>
</header>

<div class="container">

  <!-- LEFT -->
  <div class="panel">

    <h3>💡 Ideas</h3>

    <input id="ideaInput" placeholder="Enter idea"/>
    <button onclick="postIdea()">Post</button>

    <div id="ideas"></div>

    <hr/>

    <h3>📸 Upload Image</h3>
    <input type="file" id="file"/>
    <button onclick="uploadImage()">Upload</button>

  </div>

  <!-- RIGHT -->
  <div class="screen">

    <h3>📊 Live Ideas</h3>
    <div id="top"></div>

    <h3>🖼️ Images</h3>
    <div id="images"></div>

  </div>

</div>

<!-- DEBUG CONSOLE -->
<div class="debug" id="debug"></div>

<script>

let client;
let user = null;

/* OWNER LOCK (optional later) */
const OWNER_ID = "18d43a56-6376-458e-9301-add699803f40";

function log(msg){
  console.log(msg);
  document.getElementById("debug").innerHTML += msg + "<br>";
}

/* INIT */
window.onload = async () => {

  client = window.supabase.createClient(
    "https://didfhlfvdvurkfwbipli.supabase.co",
    "sb_publishable_H6LVD2AlVaJ6SvHToXorgw_4ozq4FT0"
  );

  const { data } = await client.auth.getUser();
  user = data?.user;

  log("User loaded: " + (user?.email || "none"));

  loadIdeas();
  loadImages();
};

/* POST IDEA */
async function postIdea(){

  if(!user){
    alert("Login required");
    return;
  }

  const text = document.getElementById("ideaInput").value;

  log("POST IDEA CLICKED: " + text);

  const { error } = await client.from("ideas").insert({
    text,
    votes:0
  });

  if(error){
    log("IDEA ERROR: " + error.message);
    return;
  }

  loadIdeas();
}

/* VOTE */
async function vote(id){

  log("VOTE CLICKED: " + id);

  const { data, error } = await client
    .from("ideas")
    .select("votes")
    .eq("id", id)
    .single();

  if(error){
    log("VOTE SELECT ERROR: " + error.message);
    return;
  }

  const { error: updateError } = await client
    .from("ideas")
    .update({ votes:(data?.votes||0)+1 })
    .eq("id", id);

  if(updateError){
    log("VOTE UPDATE ERROR: " + updateError.message);
    return;
  }

  loadIdeas();
}

/* LOAD IDEAS */
async function loadIdeas(){

  const { data, error } = await client.from("ideas").select("*");

  if(error){
    log("LOAD IDEAS ERROR: " + error.message);
    return;
  }

  const ideasEl = document.getElementById("ideas");
  const topEl = document.getElementById("top");

  const sorted = data.sort((a,b)=>(b.votes||0)-(a.votes||0));

  ideasEl.innerHTML = sorted.map(i=>`
    <div class="card">
      💡 ${i.text}<br>
      🗳️ ${i.votes || 0}
      <button onclick="vote('${i.id}')">Vote</button>
    </div>
  `).join("");

  topEl.innerHTML =
    "🏆 Leader: " + (sorted[0]?.text || "None");
}

/* IMAGE UPLOAD */
async function uploadImage(){

  if(!user){
    alert("Login required");
    return;
  }

  const file = document.getElementById("file").files[0];
  if(!file) return;

  const name = Date.now() + "-" + file.name;

  log("UPLOADING IMAGE...");

  const { error: uploadError } =
    await client.storage.from("campaign").upload(name, file);

  if(uploadError){
    log("UPLOAD ERROR: " + uploadError.message);
    return;
  }

  const url = client.storage.from("campaign")
    .getPublicUrl(name).data.publicUrl;

  const { error: dbError } =
    await client.from("images").insert({ url });

  if(dbError){
    log("DB IMAGE ERROR: " + dbError.message);
    return;
  }

  loadImages();
}

/* LOAD IMAGES */
async function loadImages(){

  const { data, error } = await client.from("images").select("*");

  if(error){
    log("LOAD IMAGES ERROR: " + error.message);
    return;
  }

  const imgEl = document.getElementById("images");

  imgEl.innerHTML = data.map(i=>`
    <img src="${i.url}">
  `).join("");
}

</script>

</body>
</html>
